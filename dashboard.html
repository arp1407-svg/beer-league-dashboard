function exportExcel() {
  const btn=document.getElementById('xl-btn'), st=document.getElementById('xl-status');
  if (!window.XLSX) { st.textContent='Library not loaded.'; return; }
  btn.disabled=true; st.style.color='var(--muted)'; st.textContent='Building workbook…';
  setTimeout(()=>{
    try {
      const wb=XLSX.utils.book_new();

      /* ---- Color palette ---- */
      const HDR_BG='1A6B3A', HDR_FG='FFFFFF', HDR_BD='0F4A28';
      const SHDR_BG='C8E6C9', SHDR_FG='1B5E20';
      const TTL_BG='E8F5E9';
      const ALT_BG='F0F8F0';
      const TOT_BG='EEEEEE';
      const CHAMP_BG='FFF8DC', CHAMP_FG='8B6914', CHAMP_BD='D4A017';
      // Semantic: over-par scale (lower = good in golf)
      function opBg(v){return v<0?'C6EFCE':v===0?null:v<=3?'FFEB9C':'FFC7CE';}
      function opFg(v){return v<0?'276221':v===0?'222222':v<=3?'9C6500':'9C0006';}
      // Semantic: hole score vs par
      function holeBg(d){return d<0?'C6EFCE':d===0?null:d===1?'FFEB9C':d===2?'FFC7CE':'FF0000';}
      function holeFg(d){return d<0?'276221':d===0?'222222':d===1?'9C6500':d===2?'9C0006':'FFFFFF';}

      /* ---- Border helpers ---- */
      function bd(rgb){const b={style:'thin',color:{rgb:rgb||'D0D0D0'}};return{top:b,bottom:b,left:b,right:b};}
      function mbd(){const b={style:'medium',color:{rgb:'AAAAAA'}};return{top:b,bottom:b,left:b,right:b};}

      /* ---- Cell factories ---- */
      // Dark green header
      function hc(val,al){return{v:val==null?'':val,t:'s',s:{font:{bold:true,color:{rgb:HDR_FG},sz:10},fill:{fgColor:{rgb:HDR_BG}},alignment:{horizontal:al||'center',vertical:'center',wrapText:true},border:bd(HDR_BD)}};}
      // Light green sub-header (Playoffs h2 row)
      function shc(val){return{v:val==null?'':val,t:'s',s:{font:{bold:true,color:{rgb:SHDR_FG},sz:9},fill:{fgColor:{rgb:SHDR_BG}},alignment:{horizontal:'center',vertical:'center'},border:bd('A5D6A7')}};}
      // Section title with fill
      function tc(val){return{v:String(val||''),t:'s',s:{font:{bold:true,color:{rgb:'1B5E20'},sz:11},fill:{fgColor:{rgb:TTL_BG}},alignment:{horizontal:'left',vertical:'center'},border:{bottom:{style:'thin',color:{rgb:'A5D6A7'}}}}};}
      // Standard data cell — numbers right, text left, consistent alt banding
      function dc(val,al,alt,fmt,bold){
        const t=typeof val==='number'?'n':'s';
        const cell={v:val==null?'':val,t:val==null?'s':t,s:{font:{bold:!!bold,color:{rgb:'222222'}},fill:{fgColor:{rgb:alt?ALT_BG:'FFFFFF'}},alignment:{horizontal:al||'left',vertical:'center'},border:bd()}};
        if(fmt)cell.z=fmt; return cell;}
      // Champion / historical winner row (gold)
      function cc(val,al,fmt){
        const cell={v:val==null?'':val,t:typeof val==='number'?'n':'s',s:{font:{bold:true,color:{rgb:CHAMP_FG}},fill:{fgColor:{rgb:CHAMP_BG}},alignment:{horizontal:al||'left',vertical:'center'},border:bd(CHAMP_BD)}};
        if(fmt)cell.z=fmt; return cell;}
      // Totals / summary row (gray, bold, medium border)
      function trc(val,al,fmt){
        const t=typeof val==='number'?'n':'s';
        const cell={v:val==null?'':val,t:val==null?'s':t,s:{font:{bold:true,color:{rgb:'222222'}},fill:{fgColor:{rgb:TOT_BG}},alignment:{horizontal:al||'right',vertical:'center'},border:mbd()}};
        if(fmt)cell.z=fmt; return cell;}
      // Over-par semantically colored (green <0, amber 1-3, red 4+)
      function opdc(val,op,alt,fmt){
        if(op==null)return dc(val,'right',alt,fmt);
        const bg=opBg(op), fg=opFg(op);
        const cell={v:val==null?'':val,t:typeof val==='number'?'n':'s',s:{font:{color:{rgb:fg}},fill:{fgColor:{rgb:bg||(alt?ALT_BG:'FFFFFF')}},alignment:{horizontal:'right',vertical:'center'},border:bd()}};
        if(fmt)cell.z=fmt; return cell;}
      // Hole score colored vs par (birdie/par/bogey/double/worse)
      function holedc(val,par,alt){
        if(val==null)return dc(null,'right',alt);
        const diff=val-par, bg=holeBg(diff), fg=holeFg(diff);
        return{v:val,t:'n',s:{font:{bold:diff<0,color:{rgb:fg}},fill:{fgColor:{rgb:bg||(alt?ALT_BG:'FFFFFF')}},alignment:{horizontal:'right',vertical:'center'},border:bd()}};}
      function bl(){return{v:'',t:'s',s:{}};}

      /* ---- Sheet builder ---- */
      function bws(rows,cw,fr,fc){
        const ws={};let maxC=0;
        rows.forEach((row,r)=>{maxC=Math.max(maxC,row.length);row.forEach((cell,c)=>{
          const addr=XLSX.utils.encode_cell({r,c});
          if(cell==null)ws[addr]={v:'',t:'s'};
          else if(typeof cell==='object'&&'v' in cell)ws[addr]=cell;
          else ws[addr]={v:cell,t:typeof cell==='number'?'n':'s'};
        });});
        if(!rows.length||!maxC)return ws;
        ws['!ref']=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:rows.length-1,c:maxC-1}});
        if(cw)ws['!cols']=cw.map(w=>({wch:w}));
        if(fr||fc)ws['!freeze']={xSplit:fc||0,ySplit:fr||0};
        return ws;}

      /* ---- Pre-compute course par lookup [course][holeIndex 0-8] ---- */
      const coursePars={};
      ['Red','Gold','Blue'].forEach(c=>{
        const cs=D.courseStats?.[c]; if(!cs)return;
        coursePars[c]=(cs.holes||[]).map(h=>h.par);
      });

      /* ================================================
         Sheet 1: Standings
         ================================================ */
      {
        const H=['Rank','Player','Rounds','Total','Avg Score','Avg Over Par',
                 'Raw HC','Unique Partners','Partner Bonus','Playoff HC','Best','Worst','Qualified'];
        const rows=[H.map(h=>hc(h))];
        D.standings.forEach((s,i)=>{
          const alt=i%2===1, gc=isChamp(s.player), qual=isQual(s.player);
          const d=(v,a,f,b)=>gc?cc(v,a,f):dc(v,a,alt,f,b);
          const avgOPcell=gc?cc(s.avgOverPar,'right','+0.0;-0.0;0.0'):opdc(s.avgOverPar,s.avgOverPar,alt,'+0.0;-0.0;0.0');
          const qualFill=qual?'E8F5E9':'FFF3E0', qualTxt=qual?'1B5E20':'E65100';
          const qualCell=gc?cc('★','center'):{v:qual?'Yes':'No',t:'s',s:{font:{bold:qual,color:{rgb:qualTxt}},fill:{fgColor:{rgb:gc?CHAMP_BG:qualFill}},alignment:{horizontal:'center',vertical:'center'},border:bd()}};
          rows.push([
            d(s.rank,'right'), d(s.player+(gc?' ★':''),'left',null,true),
            d(s.rounds,'right'), d(s.total,'right'),
            d(s.avg,'right','0.0'), avgOPcell,
            d(s.rawHC,'right','0.0'), d(s.uniquePartners,'right'),
            d(s.partnerBonus,'right','0.0'), d(s.playoffHC,'right','0.0'),
            d(s.best,'right'), d(s.worst,'right'), qualCell,
          ]);
        });
        // Field average totals row
        const n=D.standings.length;
        const fAvg=n?D.standings.reduce((s,r)=>s+(r.avg||0),0)/n:null;
        const fOP=n?D.standings.reduce((s,r)=>s+(r.avgOverPar||0),0)/n:null;
        rows.push([
          trc(''),trc('Field Average','left'),trc(''),trc(''),
          trc(fAvg!=null?parseFloat(fAvg.toFixed(1)):null,'right','0.0'),
          trc(fOP!=null?parseFloat(fOP.toFixed(1)):null,'right','+0.0;-0.0;0.0'),
          trc(''),trc(''),trc(''),trc(''),trc(''),trc(''),trc(''),
        ]);
        XLSX.utils.book_append_sheet(wb,bws(rows,[5,18,8,7,10,13,8,17,14,10,7,8,10],1,0),'Standings');
      }

      /* ================================================
         Sheet 2: Weekly Summary
         ================================================ */
      {
        const H=['Week','Date','Course','Players','Field Avg','Avg Over Par','Low Score','Birdies','Blowups'];
        const rows=[H.map(h=>hc(h))];
        const maxBr=Math.max(1,...D.weekly.map(w=>w.birdies||0));
        const maxBl=Math.max(1,...D.weekly.map(w=>w.blowups||0));
        D.weekly.forEach((w,i)=>{
          const alt=i%2===1;
          // Birdies: green intensity scale
          const br=w.birdies||0, brR=br/maxBr;
          const brBg=brR>0.66?'00B050':brR>0.33?'70AD47':'C6EFCE';
          const brFg=brR>0.33?'FFFFFF':'276221';
          const brCell={v:br,t:'n',s:{font:{bold:brR>0.5,color:{rgb:br?brFg:'AAAAAA'}},fill:{fgColor:{rgb:br?brBg:(alt?ALT_BG:'FFFFFF')}},alignment:{horizontal:'right',vertical:'center'},border:bd()}};
          // Blowups: amber→red intensity scale
          const bl2=w.blowups||0, blR=bl2/maxBl;
          const blBg=blR>0.66?'C00000':blR>0.33?'FF5722':'FFCDD2';
          const blFg=blR>0.33?'FFFFFF':'9C0006';
          const blCell={v:bl2,t:'n',s:{font:{bold:blR>0.5,color:{rgb:bl2?blFg:'AAAAAA'}},fill:{fgColor:{rgb:bl2?blBg:(alt?ALT_BG:'FFFFFF')}},alignment:{horizontal:'right',vertical:'center'},border:bd()}};
          rows.push([
            dc(w.week,'right',alt), dc(w.date,'left',alt),
            dc(w.course,'left',alt), dc(w.count,'right',alt),
            dc(w.fieldAvg,'right',alt,'0.0'),
            opdc(w.fieldAvgOP,w.fieldAvgOP,alt,'+0.0;-0.0;0.0'),
            dc(w.low,'right',alt), brCell, blCell,
          ]);
        });
        // Season totals row
        const totBr=D.weekly.reduce((s,w)=>s+(w.birdies||0),0);
        const totBl=D.weekly.reduce((s,w)=>s+(w.blowups||0),0);
        const totPl=D.weekly.reduce((s,w)=>s+(w.count||0),0);
        const fAvg=D.weekly.length?D.weekly.reduce((s,w)=>s+(w.fieldAvg||0),0)/D.weekly.length:null;
        rows.push([trc(''),trc('Season Total','left'),trc(''),trc(totPl,'right'),
          trc(fAvg!=null?parseFloat(fAvg.toFixed(1)):null,'right','0.0'),
          trc(''),trc(''),trc(totBr,'right'),trc(totBl,'right')]);
        XLSX.utils.book_append_sheet(wb,bws(rows,[6,12,8,8,10,13,10,9,9],1,0),'Weekly Summary');
      }

      /* ================================================
         Sheet 3: Score Cards
         ================================================ */
      {
        const H=['Week','Date','Course','Group','Player',
                 'H1','H2','H3','H4','H5','H6','H7','H8','H9',
                 'Total','Over Par','Birdies','Blowups'];
        const rows=[H.map(h=>hc(h))];
        let ri=0;
        D.weekly.forEach(w=>{(w.rows||[]).forEach(r=>{
          const alt=ri%2===1, holes=r.holes||[];
          const pars=coursePars[r.course]||Array(9).fill(4);
          rows.push([
            dc(r.week,'right',alt), dc(r.date,'left',alt),
            dc(r.course,'left',alt), dc(r.group,'right',alt),
            dc(r.player,'left',alt),
            ...Array.from({length:9},(_,h)=>holedc(holes[h]??null,pars[h]??4,alt)),
            dc(r.total,'right',alt,null,true),
            opdc(r.overPar,r.overPar,alt,'+0;-0;0'),
            dc(r.br,'right',alt), dc(r.bl,'right',alt),
          ]);
          ri++;});});
        XLSX.utils.book_append_sheet(wb,bws(rows,[6,12,8,6,16,5,5,5,5,5,5,5,5,5,7,9,8,8],1,0),'Score Cards');
      }

      /* ================================================
         Sheet 4: Course Stats
         ================================================ */
      {
        const rows=[];
        ['Red','Gold','Blue'].forEach(course=>{
          const cs=D.courseStats?.[course]; if(!cs)return;
          if(rows.length)rows.push([bl(),bl(),bl(),bl(),bl()]);
          const avgOP=cs.avgOP??((cs.avgTotal??0)-36);
          rows.push([tc(`${course} Course — Field Avg: ${cs.avgTotal?.toFixed(1)??'—'} (${avgOP>=0?'+':''}${avgOP.toFixed(1)} over par)`),bl(),bl(),bl(),bl()]);
          rows.push(['Hole','Par','Avg Score','Avg Over Par','Rounds'].map(h=>hc(h)));
          (cs.holes||[]).forEach((h,i)=>{
            const alt=i%2===1;
            rows.push([dc(h.hole,'right',alt), dc(h.par,'right',alt),
              dc(h.avg,'right',alt,'0.00'),
              opdc(h.avgOP,h.avgOP,alt,'+0.00;-0.00;0.00'),
              dc(h.n,'right',alt)]);
          });
          rows.push([trc('Total / Avg','left'),trc(''),
            trc(cs.avgTotal!=null?parseFloat(cs.avgTotal.toFixed(2)):null,'right','0.00'),
            trc(avgOP!=null?parseFloat(avgOP.toFixed(2)):null,'right','+0.00;-0.00;0.00'),
            trc('')]);
        });
        XLSX.utils.book_append_sheet(wb,bws(rows,[12,6,12,14,14],0,0),'Course Stats');
      }

      /* ================================================
         Sheet 5: Partner Matrix
         ================================================ */
      {
        const players=D.partnerPlayers||Object.keys(D.partnerMatrix||{}).sort();
        const rows=[[hc('Player \\','left'),...players.map(p=>hc(p.split(' ')[0]))]];
        players.forEach((p,i)=>{
          const alt=i%2===1;
          const row=[dc(p,'left',alt,null,true)];
          players.forEach(p2=>{
            if(p===p2){
              row.push({v:'—',t:'s',s:{font:{color:{rgb:'BBBBBB'}},fill:{fgColor:{rgb:'E0E0E0'}},alignment:{horizontal:'center'},border:bd()}});
            } else {
              const n=(D.partnerMatrix?.[p]?.[p2])||0;
              const bg=n>=6?'1B5E20':n>=4?'2E7D32':n>=2?'C8E6C9':n===1?'E8F5E9':null;
              const fg=n>=4?'FFFFFF':n>=2?'1B5E20':n===1?'2E7D32':'DDDDDD';
              row.push({v:n||'',t:n?'n':'s',s:{font:{bold:n>=4,color:{rgb:fg}},fill:{fgColor:{rgb:bg||(alt?ALT_BG:'FFFFFF')}},alignment:{horizontal:'right'},border:bd()}});
            }
          });
          rows.push(row);
        });
        // Legend
        rows.push([bl()]);
        rows.push([dc('Legend (rounds played together)','left',false,null,true),dc('1','right',false),dc('2–3','right',false),dc('4–5','right',false),dc('6+','right',false)]);
        rows.push([bl(),
          {v:'',t:'s',s:{fill:{fgColor:{rgb:'E8F5E9'}},border:bd()}},
          {v:'',t:'s',s:{fill:{fgColor:{rgb:'C8E6C9'}},border:bd()}},
          {v:'',t:'s',s:{fill:{fgColor:{rgb:'2E7D32'}},border:bd()}},
          {v:'',t:'s',s:{fill:{fgColor:{rgb:'1B5E20'}},border:bd()}},
        ]);
        const ws=bws(rows,[18,...players.map(()=>4)],1,1);
        XLSX.utils.book_append_sheet(wb,ws,'Partner Matrix');
      }

      /* ================================================
         Sheet 6: Playoffs
         ================================================ */
      if(D.playoff?.players?.length){
        const rounds=D.playoff.rounds||[];
        const completed=new Set(D.playoff.completed||[]);
        // Row 1: round group headers + totals
        const h1=[hc('Player','left'),hc('HC'),hc('Reg\nAvg')];
        rounds.forEach(r=>h1.push(hc(completed.has(r)?r:r+' *'),hc('')));
        h1.push(hc('Total\nGross'),hc('Total\nNet'),hc('Rds\nPlayed'),hc('Missed'),hc('Score\nTo Win'));
        // Row 2: gross/net sub-labels (light green sub-header)
        const h2=[bl(),bl(),bl()]; rounds.forEach(()=>h2.push(shc('Gross'),shc('Net')));
        h2.push(bl(),bl(),bl(),bl(),bl());
        const rows=[h1,h2], merges=[];
        rounds.forEach((_,ri)=>{const c0=3+ri*2; merges.push({s:{r:0,c:c0},e:{r:0,c:c0+1}});});
        // Identify current leader for Net highlight
        const netVals=D.playoff.players.filter(p=>p.totalNet!=null&&p.inClubhouse).map(p=>p.totalNet);
        const leaderNet=netVals.length?Math.min(...netVals):null;
        D.playoff.players.forEach((p,i)=>{
          const alt=i%2===1, gc=isChamp(p.player);
          const d=(v,a,f,b)=>gc?cc(v,a,f):dc(v,a,alt,f,b);
          const row=[d(p.player+(gc?' ★':''),'left',null,true), d(p.hc,'right','0.0'), d(p.avg,'right','0.0')];
          (p.rounds||[]).forEach(rd=>{
            if(rd.played){
              row.push(d(rd.gross,'right'));
              row.push(d(rd.net!=null?rd.net:null,'right','0.0'));
            } else if(rd.future){
              const gs={font:{italic:true,color:{rgb:'999999'}},fill:{fgColor:{rgb:alt?ALT_BG:'FFFFFF'}},border:bd()};
              row.push({v:rd.projGross??'',t:rd.projGross!=null?'n':'s',s:{...gs,alignment:{horizontal:'right'}}});
              row.push({v:rd.projNet!=null?parseFloat(rd.projNet.toFixed(1)):'',t:rd.projNet!=null?'n':'s',s:{...gs,alignment:{horizontal:'right'}}});
            } else {
              const es={font:{color:{rgb:'BBBBBB'}},fill:{fgColor:{rgb:alt?ALT_BG:'FFFFFF'}},alignment:{horizontal:'center'},border:bd()};
              row.push({v:'DNS',t:'s',s:es}); row.push({v:'',t:'s',s:{...es}});
            }
          });
          row.push(d(p.totalGross,'right',null,true));
          // Net total: highlight leader green
          const netVal=p.totalNet!=null?parseFloat(p.totalNet.toFixed(1)):null;
          const isLeader=netVal!=null&&leaderNet!=null&&p.totalNet===leaderNet;
          const netCell=gc?cc(netVal,'right','0.0'):isLeader
            ?{v:netVal,t:'n',s:{font:{bold:true,color:{rgb:'276221'}},fill:{fgColor:{rgb:'C6EFCE'}},alignment:{horizontal:'right'},border:mbd()},z:'0.0'}
            :dc(netVal,'right',alt,'0.0',true);
          row.push(netCell);
          row.push(d(p.played,'right')); row.push(d(p.missed,'right'));
          // Score-to-win: blue if a target exists
          const stw=p.scoreToWin;
          const stwCell=stw!=null
            ?{v:stw,t:'n',s:{font:{bold:true,color:{rgb:'1565C0'}},fill:{fgColor:{rgb:'E3F2FD'}},alignment:{horizontal:'right'},border:bd()}}
            :{v:p.dq?'DQ':p.inClubhouse?'—':'',t:'s',s:{font:{bold:!!p.dq,color:{rgb:p.dq?'9C0006':'888888'}},fill:{fgColor:{rgb:alt?ALT_BG:'FFFFFF'}},alignment:{horizontal:'center'},border:bd()}};
          row.push(stwCell);
          rows.push(row);
        });
        rows.push([dc('* = future round  |  Italics = projected  |  Score To Win = net target to take lead','left',false)]);
        const ws=bws(rows,[18,6,8,...rounds.flatMap(()=>[8,8]),11,10,8,8,12],2,0);
        if(merges.length)ws['!merges']=merges;
        XLSX.utils.book_append_sheet(wb,ws,'Playoffs');
      }

      /* ================================================
         Sheet 7: Season Leaders
         ================================================ */
      {
        const rows=[];
        // Birdies — green podium
        rows.push([tc('BIRDIE LEADERS'),bl(),bl()]);
        rows.push(['#','Player','Birdies'].map(h=>hc(h)));
        (D.leaders?.birdies||[]).forEach(([pl,n],i)=>{
          const alt=i%2===1;
          const bg=i===0?'00B050':i===1?'70AD47':i===2?'C6EFCE':(alt?ALT_BG:'FFFFFF');
          const fg=i<=1?'FFFFFF':'276221';
          const nCell={v:n,t:'n',s:{font:{bold:i<3,color:{rgb:i<3?fg:'222222'}},fill:{fgColor:{rgb:bg}},alignment:{horizontal:'right'},border:bd()}};
          rows.push([dc(i+1,'right',alt), dc(pl,'left',alt,null,i<3), nCell]);
        });
        rows.push([bl(),bl(),bl()]);
        // Blowups — red podium
        rows.push([{v:'BLOWUP LEADERS',t:'s',s:{font:{bold:true,color:{rgb:'9C0006'},sz:11},fill:{fgColor:{rgb:'FFEBEE'}},alignment:{horizontal:'left',vertical:'center'},border:{bottom:{style:'thin',color:{rgb:'FFCDD2'}}}}},bl(),bl()]);
        rows.push(['#','Player','Blowups'].map(h=>hc(h)));
        (D.leaders?.blowups||[]).forEach(([pl,n],i)=>{
          const alt=i%2===1;
          const bg=i===0?'C00000':i===1?'FF5722':i===2?'FFCDD2':(alt?ALT_BG:'FFFFFF');
          const fg=i<=1?'FFFFFF':'9C0006';
          const nCell={v:n,t:'n',s:{font:{bold:i<3,color:{rgb:i<3?fg:'222222'}},fill:{fgColor:{rgb:bg}},alignment:{horizontal:'right'},border:bd()}};
          rows.push([dc(i+1,'right',alt), dc(pl,'left',alt,null,i<3), nCell]);
        });
        rows.push([bl(),bl(),bl()]);
        // Low rounds — green podium
        const lowR=D.leaders?.lowRounds||D.lowRounds||[];
        rows.push([tc('LOW ROUNDS'),bl(),bl(),bl(),bl(),bl()]);
        rows.push(['#','Player','Score','Course','Week','Date'].map(h=>hc(h)));
        lowR.forEach((r,i)=>{
          const alt=i%2===1;
          const bg=i===0?'00B050':i===1?'C6EFCE':i===2?'E8F5E9':(alt?ALT_BG:'FFFFFF');
          const scoreFg=i===0?'FFFFFF':'276221';
          const scoreCell={v:r.score,t:'n',s:{font:{bold:i<3,color:{rgb:i<3?scoreFg:'222222'}},fill:{fgColor:{rgb:bg}},alignment:{horizontal:'right'},border:bd()}};
          rows.push([dc(i+1,'right',alt), dc(r.player,'left',alt,null,i<3), scoreCell,
            dc(r.course,'left',alt), dc(r.week,'right',alt), dc(r.date,'left',alt)]);
        });
        XLSX.utils.book_append_sheet(wb,bws(rows,[5,18,10,10,8,12],0,0),'Season Leaders');
      }

      /* ================================================
         Sheet 8: Champions
         ================================================ */
      {
        const rows=[['Year','Champion'].map(h=>hc(h))];
        (D.championData||[]).forEach((ch,i)=>{
          const alt=i%2===1;
          rows.push([dc(ch.year,'left',alt), dc(ch.name,'left',alt,null,true)]);
        });
        XLSX.utils.book_append_sheet(wb,bws(rows,[16,22],1,0),'Champions');
      }

      /* ================================================
         Sheet 9: Contacts
         ================================================ */
      {
        const rows=[['Full Name','Score ID','Email'].map(h=>hc(h))];
        (D.contacts||[]).forEach((ct,i)=>{const alt=i%2===1;
          rows.push([dc(ct.name,'left',alt), dc(ct.scoreId,'left',alt), dc(ct.email,'left',alt)]);
        });
        XLSX.utils.book_append_sheet(wb,bws(rows,[22,14,34],1,0),'Contacts');
      }

      /* ---- Download ---- */
      const latest=D.weekly[D.weekly.length-1];
      const wkLabel=latest?`_Wk${latest.week}`:'';
      XLSX.writeFile(wb,`BeerLeague2026${wkLabel}.xlsx`);
      st.style.color='var(--accent)'; st.textContent=`✓ Downloaded BeerLeague2026${wkLabel}.xlsx`;
    } catch(e) {
      st.style.color='var(--red)'; st.textContent='Error: '+e.message; console.error(e);
    }
    btn.disabled=false;
  }, 60);
}

// Init
rStandings(); seen.add('standings');
