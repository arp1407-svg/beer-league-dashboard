<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Beer League 2026</title>
<style>
:root {
  --bg:#0d1117; --surface:#161b22; --s2:#21262d; --border:#30363d;
  --accent:#3fb950; --gold:#e3b341; --red:#f85149; --blue:#58a6ff;
  --text:#c9d1d9; --muted:#8b949e;
}
*{box-sizing:border-box;margin:0;padding:0;}
button,a,select,input{touch-action:manipulation;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;font-size:16px;}

/* ---- Header ---- */
header{background:linear-gradient(135deg,#161b22,#0d1117);border-bottom:1px solid var(--border);padding:.9rem 1.25rem;}
.hdr{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:.85rem;}
.beer-icon{font-size:2rem;flex-shrink:0;}
h1{font-size:1.45rem;font-weight:700;color:#fff;letter-spacing:-.02em;line-height:1.2;}
.hdr-sub{color:var(--muted);font-size:.78rem;margin-top:.18rem;}

/* ---- Tab Nav ---- */
.nav-wrap{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.tab-nav{max-width:1400px;margin:0 auto;display:flex;overflow-x:auto;scrollbar-width:none;}
.tab-nav::-webkit-scrollbar{display:none;}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);padding:.75rem .95rem;cursor:pointer;font-size:.84rem;font-weight:500;white-space:nowrap;transition:all .15s;flex-shrink:0;}
.tab-btn:hover{color:var(--text);background:rgba(255,255,255,.03);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ---- Layout ---- */
main{max-width:1400px;margin:0 auto;padding:1.25rem 1rem;}
.tab-pane{display:none;}
.tab-pane.active{display:block;animation:fi .18s ease;}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}

/* ---- Stat Cards ---- */
.stat-row{display:flex;flex-wrap:wrap;gap:.6rem;margin-bottom:1.1rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:.8rem 1rem;flex:1;min-width:100px;}
.stat-val{font-size:1.25rem;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.stat-lbl{color:var(--muted);font-size:.68rem;margin-top:.2rem;text-transform:uppercase;letter-spacing:.05em;}

/* ---- Cards ---- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.1rem;margin-bottom:1.1rem;}
.card-title{font-size:.95rem;font-weight:600;color:#fff;margin-bottom:.8rem;}
.card-sub{color:var(--muted);font-size:.75rem;margin-top:-.5rem;margin-bottom:.8rem;}

/* ---- Tables ---- */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.dtbl{width:100%;border-collapse:collapse;font-size:.82rem;}
.dtbl th{text-align:left;padding:.42rem .7rem;color:var(--muted);font-weight:600;font-size:.69rem;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);white-space:nowrap;}
.dtbl td{padding:.46rem .7rem;border-bottom:1px solid #1a2030;white-space:nowrap;}
.dtbl tbody tr:hover{background:var(--s2);}
.dtbl tbody tr:last-child td{border-bottom:none;}
.rk{font-weight:700;color:var(--muted);}
.pl{font-weight:500;color:#fff;}
.hc{font-weight:700;color:var(--accent);}
.tot{font-weight:700;}
.grp{color:var(--muted);font-size:.78rem;}
.tg{color:var(--text);}
.row-champ{background:rgba(227,179,65,.04);}
.row-qual{background:rgba(63,185,80,.03);}

/* ---- Colors ---- */
.g{color:var(--accent);} .gd{color:var(--gold);} .r{color:var(--red);} .mu{color:var(--muted);}

/* ---- Badges ---- */
.badge{display:inline-flex;align-items:center;padding:.18rem .5rem;border-radius:20px;font-size:.7rem;font-weight:600;}
.b-g{background:rgba(63,185,80,.15);color:var(--accent);}
.b-gold{background:rgba(227,179,65,.15);color:var(--gold);}
.b-mu{background:rgba(139,148,158,.1);color:var(--muted);}

/* ---- Hole cells ---- */
.hc-cell{text-align:center;font-weight:600;min-width:30px;}
.h-bir{background:rgba(63,185,80,.28);color:var(--accent);}
.h-par{color:var(--text);}
.h-bog{background:rgba(248,81,73,.12);color:#e08080;}
.h-dbl{background:rgba(248,81,73,.26);color:var(--red);}
.h-blw{background:rgba(248,81,73,.48);color:var(--red);font-weight:800;}
.par-hdr td,.par-hdr th{background:#1a2030;color:var(--muted);font-size:.75rem;padding:.26rem .7rem;}
.pc{text-align:center;color:var(--muted);}

/* ---- Segment / Week buttons ---- */
.btn-row{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:1.1rem;}
.seg{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.38rem .82rem;border-radius:6px;cursor:pointer;font-size:.82rem;transition:all .15s;}
.seg:hover{border-color:var(--accent);color:var(--accent);}
.seg.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}

/* ---- Select row ---- */
.sel-row{display:flex;align-items:center;gap:.7rem;margin-bottom:1.1rem;flex-wrap:wrap;}
.sel-row label{color:var(--muted);font-size:.82rem;font-weight:500;}
.sel-row select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.42rem .8rem;border-radius:6px;font-size:.88rem;cursor:pointer;outline:none;min-width:170px;}
.sel-row select:focus{border-color:var(--accent);}

/* ---- Charts ---- */
.chart-wrap{position:relative;height:260px;}

/* ---- Banners ---- */
.banner{padding:.6rem 1rem;border-radius:8px;margin-bottom:.9rem;font-weight:600;font-size:.86rem;}
.bn-gold{background:rgba(227,179,65,.12);border:1px solid rgba(227,179,65,.3);color:var(--gold);}
.bn-g{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.25);color:var(--accent);}
.bn-mu{background:rgba(139,148,158,.08);border:1px solid var(--border);color:var(--muted);}

/* ---- Inline bar ---- */
.bar-row{display:flex;align-items:center;gap:.55rem;}
.bar-fill{height:9px;background:var(--accent);border-radius:3px;opacity:.7;min-width:3px;}

/* ---- Partner Matrix ---- */
.mx-outer{overflow:auto;max-height:540px;-webkit-overflow-scrolling:touch;}
.mx-tbl{border-collapse:collapse;font-size:.68rem;}
.mx-tbl td,.mx-tbl th{border:1px solid #1a2030;padding:.2rem .3rem;text-align:center;min-width:24px;}
.mrow{text-align:left!important;font-weight:500;color:var(--text);white-space:nowrap;padding:.2rem .55rem!important;background:var(--surface);position:sticky;left:0;z-index:2;cursor:pointer;}
.mrow:hover{color:var(--accent);}
.mcol{color:var(--muted);font-size:.62rem;background:var(--s2);position:sticky;top:0;z-index:1;}
.mself{color:#30363d;background:#0d1117;}

/* ---- Two-col ---- */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem;margin-bottom:1.1rem;}

/* ---- Champions ---- */
.champ-list{display:flex;flex-direction:column;gap:.5rem;}
.champ-entry{display:flex;align-items:center;gap:.65rem;padding:.55rem .8rem;border-radius:8px;background:rgba(227,179,65,.05);border:1px solid rgba(227,179,65,.12);}
.champ-name{font-size:.92rem;font-weight:600;color:var(--gold);}
.sub-hdr{font-size:.74rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.55rem;}
.lgrid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;}

/* ---- Recap Tab ---- */
.recap-hl{font-size:1.2rem;font-weight:700;color:#fff;margin-bottom:.65rem;line-height:1.3;}
.recap-pts{list-style:none;display:flex;flex-direction:column;gap:.42rem;margin-bottom:.8rem;}
.recap-pts li:before{content:'→';color:var(--accent);margin-right:.45rem;}
.recap-pts li{color:var(--text);line-height:1.5;}
.recap-body{color:var(--text);line-height:1.75;white-space:pre-wrap;font-size:.9rem;}
.season-notes{color:var(--text);line-height:1.8;white-space:pre-wrap;font-size:.9rem;}
.no-recap{color:var(--muted);font-style:italic;}

/* ---- Monte Carlo ---- */
.mc-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.1rem;margin-bottom:1.1rem;}
.mc-row{display:flex;flex-wrap:wrap;align-items:center;gap:.85rem;margin-bottom:.7rem;}
.mc-label{color:var(--muted);font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;}
.mc-rg{display:flex;gap:.4rem;flex-wrap:wrap;}
.mc-rb{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:.32rem .75rem;border-radius:5px;cursor:pointer;font-size:.8rem;}
.mc-rb.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
.run-btn{background:var(--accent);color:#000;border:none;padding:.5rem 1.4rem;border-radius:7px;cursor:pointer;font-size:.88rem;font-weight:700;transition:opacity .15s;}
.run-btn:hover{opacity:.85;} .run-btn:disabled{opacity:.45;cursor:not-allowed;}
.prog-wrap{background:var(--s2);border-radius:4px;height:5px;overflow:hidden;margin:.5rem 0;}
.prog-bar{height:100%;background:var(--accent);border-radius:4px;transition:width .08s;width:0;}
.win-bar-cell{white-space:nowrap;}
.win-bar{display:inline-block;height:9px;background:var(--accent);border-radius:3px;opacity:.7;vertical-align:middle;margin-right:.35rem;}
.mc-qual-note{font-size:.75rem;color:var(--muted);margin-top:.4rem;}
.mc-player-tbl{width:100%;border-collapse:collapse;font-size:.8rem;margin-top:.6rem;}
.mc-player-tbl th{color:var(--muted);font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;padding:.3rem .55rem;border-bottom:1px solid var(--border);}
.mc-player-tbl td{padding:.35rem .55rem;border-bottom:1px solid #1a2030;}
.mc-player-tbl tr:last-child td{border-bottom:none;}
.mc-player-tbl input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px;cursor:pointer;}
.q-chk{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.6rem;}
.q-chk button{background:none;border:1px solid var(--border);color:var(--muted);padding:.28rem .65rem;border-radius:5px;cursor:pointer;font-size:.75rem;}
.q-chk button:hover{border-color:var(--accent);color:var(--accent);}

/* ---- Mobile ---- */
@media(max-width:600px){
  h1{font-size:1.2rem;}
  .hdr-sub{display:none;}
  .tab-btn{padding:.68rem .7rem;font-size:.78rem;}
  main{padding:1rem .75rem;}
  .stat-val{font-size:1.1rem;}
  .stat-card{min-width:calc(50% - .35rem);padding:.68rem .8rem;}
  .card{padding:.9rem;}
  .chart-wrap{height:210px;}
  .two-col{grid-template-columns:1fr;}
  .lgrid{grid-template-columns:1fr;}
  .mx-outer{display:none;}
  .mx-mobile{display:block!important;}
  .dtbl{font-size:.76rem;}
  .dtbl th{font-size:.64rem;}
  .dtbl td{padding:.38rem .5rem;}
  .seg{padding:.35rem .65rem;font-size:.78rem;}
  .run-btn{width:100%;}
  .mc-row{flex-direction:column;align-items:flex-start;}
  input,select{font-size:16px!important;}
}
@media(min-width:601px){.mx-mobile{display:none;}}

/* ---- Contacts ---- */
.ct-search{width:100%;background:var(--s2);border:1px solid var(--border);color:var(--text);padding:.55rem .8rem;border-radius:7px;font-size:.88rem;outline:none;margin-bottom:.9rem;}
.ct-search:focus{border-color:var(--accent);}
.copy-btn{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:.42rem .9rem;border-radius:6px;cursor:pointer;font-size:.82rem;transition:all .15s;}
.copy-btn:hover{border-color:var(--accent);color:var(--accent);}
.copy-btn.copied{background:rgba(63,185,80,.15);border-color:var(--accent);color:var(--accent);}

/* ---- More dropdown ---- */
.more-wrap{position:relative;flex-shrink:0;}
.more-btn{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);padding:.75rem .95rem;cursor:pointer;font-size:.84rem;font-weight:500;white-space:nowrap;transition:all .15s;}
.more-btn:hover{color:var(--text);background:rgba(255,255,255,.03);}
.more-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.more-drop{display:none;position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:8px;min-width:170px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.5);padding:.4rem 0;}
.more-drop.open{display:block;}
.more-drop button{display:block;width:100%;background:none;border:none;color:var(--text);padding:.65rem 1.1rem;text-align:left;cursor:pointer;font-size:.9rem;transition:background .1s;}
.more-drop button:hover{background:var(--s2);color:var(--accent);}

/* ---- Email Tab ---- */
.em-recip{display:flex;align-items:center;gap:.38rem;padding:.32rem .65rem;border-radius:6px;background:var(--s2);border:1px solid var(--border);cursor:pointer;font-size:.82rem;color:var(--text);transition:border-color .12s;}
.em-recip:hover{border-color:var(--accent);}
.em-recip input[type=checkbox]{accent-color:var(--accent);width:13px;height:13px;cursor:pointer;}
.em-recip.checked{border-color:rgba(63,185,80,.45);background:rgba(63,185,80,.06);}
.em-body-pre{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:.9rem;font-size:.76rem;color:var(--text);white-space:pre-wrap;max-height:240px;overflow-y:auto;font-family:inherit;line-height:1.65;margin-top:.45rem;}
.em-sec-hdr{font-size:.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.45rem;}
.em-action-row{display:flex;flex-wrap:wrap;gap:.6rem;margin-top:1rem;}
</style>
</head>
<body>

<noscript><div style="background:#e3b341;color:#000;padding:1.2rem 1.5rem;font-family:sans-serif;font-size:1rem;font-weight:600;text-align:center;line-height:1.5;">⚠️ JavaScript is required. If you opened this from an email attachment or OneDrive, tap the share icon and choose <strong>Open in Safari</strong> instead.</div></noscript>

<header>
 <div class="hdr">
  <span class="beer-icon">🍺</span>
  <div><h1>Beer League 2026</h1><p class="hdr-sub">Season Dashboard</p></div>
 </div>
</header>

<div class="nav-wrap">
 <nav class="tab-nav">
  <button class="tab-btn active" onclick="show('standings',this)">🏆 Standings</button>
  <button class="tab-btn" onclick="show('recap',this)">📰 Recap</button>
  <button class="tab-btn" onclick="show('weekly',this)">📅 Weekly</button>
  <button class="tab-btn" onclick="show('players',this)">👤 Players</button>
  <button class="tab-btn" onclick="show('courses',this)">⛳ Courses</button>
  <div class="more-wrap" id="moreWrap">
   <button class="more-btn" id="moreBtn" onclick="toggleMore()">More ▾</button>
  </div>
 </nav>
</div>

<main>
 <div id="standings"   class="tab-pane active"></div>
 <div id="recap"       class="tab-pane"></div>
 <div id="weekly"      class="tab-pane"></div>
 <div id="players"     class="tab-pane"></div>
 <div id="partners"    class="tab-pane"></div>
 <div id="bff"         class="tab-pane"></div>
 <div id="courses"     class="tab-pane"></div>
 <div id="montecarlo"  class="tab-pane"></div>
 <div id="qualwatch"   class="tab-pane"></div>
 <div id="playoffs"    class="tab-pane"></div>
 <div id="champions"   class="tab-pane"></div>
 <div id="contacts"    class="tab-pane"></div>
 <div id="email"       class="tab-pane"></div>
 <div id="xlexport"    class="tab-pane"></div>
</main>

0,"overallStd":5.29,"n":4,"courses":{"Gold":{"mean":66.0,"std":4.24,"n":2},"Blue":{"mean":62.0,"std":7.07,"n":2}}}],"leagueStd":6.04,"courseDiffs":{"Gold":-0.01,"Red":1.04,"Blue":-1.17},"minStd":1.5,"mcMinData":3,"commentary":{"seasonNotes":"Through 19 weeks, 398 regular rounds have been recorded across 43 players on the Red, Gold, and Blue courses (a scoring cleanup this week merged a duplicate 'Nick W Jr' / 'Nick W Jr.' entry into one player). With a 10-round minimum to qualify for the season standings, Nick W Jr. now leads at a 3.81 playoff handicap on a 38.64 average over 11 rounds, trailed by Greg N (6.08 HC, 42.10 avg, 10 rounds) and Dan M (6.10 HC, 41.25 avg, a league-high-tying 16 rounds). Gary B and Sean E have played the most golf this season, 17 rounds apiece. The birdie race is now a dead heat: Tyler D and Nick W Jr. are tied at 14 apiece for the season lead. The season-low round is a 36, matched three times — Steve M (Week 10, Gold), John S (Week 17, Blue), and Nick W Jr. (Week 19, Gold, the only player to touch par that night). Playoffs haven't started: all four rounds (P1–P4) remain on the schedule, with standings currently projected off regular-season averages.","weeklyRecaps":{"9":{"headline":"Week 9 — Red Course, May 11 · Steve M Debuts with a Bang","highlights":["Low gross: Steve M — 39 (+3) in his Beer League debut. Best round of the week.","Low net: Joe B — 34.1 (43 gross, 8.90 HC). John U right behind at 34.2.","26 players out. Field averaged 48.5 (+12.5). Range 39 to 65.","4 birdies on the day: Dave G (H9), Rocky M (H5), Steve M (H8), Tyler D (H7).","Blow-up parade: Randy R had 3 blow-up holes alone; Scott A added 3 more. 9 total blow-ups on the day.","Toughest hole: H1 (par 4) — field averaged 5.8 (+1.8). Six players carded 7 or worse there.","Easiest hole: H8 (par 4) — field averaged 5.0 (+1.0).","Kerry M's H3: a 10 on the par-5 (+5) was the worst single hole of the day."],"body":"Steve M walked in off the street and immediately looked like the best golfer in the league. A 39 on the Red Course for his debut puts him atop the standings at a 2.60 HC — with only one round to his name, the sample is tiny, but the performance was real.\n\nJoe B and John U went 1-2 on the net board, both finishing at 34.1/34.2 net. Matt D (40 gross, 35.1 net) and Rocky M (40 gross, 35.5 net) were the other standouts in a tough field day — the Red Course's H1 was particularly brutal, playing nearly 2 strokes over par and claiming 6 players at 7 or worse.\n\nStorylines from the playoff simulation (data through Week 9): Dan B leads win probability at 19.9%, powered by a wide score distribution and a 12.37 HC that gives him room to manufacture a low-net result. Tyler D (15.2%) and Sean B (14.1%) are the steady chasers. The consistency paradox continues to define the picture — Nick W Jr. is Top-10 in 82% of simulations but wins only 5.8% of the time because his 3.60 HC leaves no net cushion on a hot day."},"10":{"headline":"Week 10 — Gold Course, May 18","highlights":["Round of the day: Steve M — 36 (even par), tying the season low.","Sub-40 club: Steve M (36), Sean B (38), Dan M (38).","22 players. Field averaged 46.5 (+10.5). Cleanest round of the season.","9 birdies across the field — only 2 blow-up holes all day.","Low net: John U — 28.5 (41 gross, 12.50 HC). Biggest performance vs. season avg.","Toughest hole: H6 (par 4) — field avg 5.5 (+1.5).","Biggest improvement: John U shot 41 vs his season avg of 49.8 — a full 9 strokes better."],"body":""},"11":{"headline":"Week 11 — Blue Course, May 26 · Tyler D Leads the Way","highlights":["Low gross: Tyler D — 37 (+1), round of the day on Blue.","Sub-40 club: Tyler D (37), John U / John S / Dan M (all 40 flat).","19 players. Field averaged 45.6 (+9.6). Range 37 to 62.","8 birdies on the day, 16 blow-ups — Blue's teeth showed up again.","Gary B's two-birdie round — H1 and H8 in the same card, finishing 41 (+5).","Toughest hole: H4 (par 4) — field averaged 5.42 (+1.42). The Blue's consistent villain.","Easiest hole: H2 (par 4) — field averaged 4.47 (+0.47), the lone soft spot.","Blow-up award: Randy R posted a 62 (+26) with 7 blow-up holes — including a 10 on H9 (par 5, +5) to finish."],"body":"Tyler D played the way he's played all year — steady, birdie-opportunistic, and head of the field when it mattered. His 37 on Blue was the low card of the week and has him sitting at a 5.62 HC heading into the playoffs. He also leads the league in birdies with 8 on the season — the only player making consistent noise on the good side of the ledger. His problem? Steve M and Nick W Jr. are sitting at 1.70 and 3.50 respectively, making the net math tough even on a hot day.\n\nThe Blue Course played its usual brand of punishment. H4 (par 4) averaged 5.42 across all 19 players — nobody escaped it unscathed. The field did find some relief on H2, but the rest of the card kept scores in check. John U, John S, and Dan M all posted clean 40s in decent conditions — steady enough, but not the kind of scorelines that flip the standings.\n\nAfter 11 weeks, the standings picture is coming into focus. P1 and P2 are in the books. With the best-3-of-4 format still in play, one scorching round from a mid-pack HC player can blow the whole leaderboard open."},"12":{"headline":"Week 12 — Red Course, June 1 · Tyler D Makes It Look Easy","highlights":["Low gross: Tyler D — 38 (+2), the only sub-40 round on a brutally tough field day.","27 players. Field averaged 48.5 (+12.5). Range 38 to 64 — a punishing 26-stroke spread.","Just 2 birdies across the entire field: Tyler D (H3, par 5) and John J (H8, par 4).","36 blow-up holes logged across 27 players — Red Course was not in a giving mood.","Toughest hole: H1 (par 4) — field averaged 5.74 (+1.74). Nobody got a free opener.","Easiest hole: H6 (par 5) — field averaged 5.74 (+0.74), the lone relative soft spot.","Rocky M posted 41 (+5) in 2nd — a solid round that holds his #3 playoff spot (HC 4.54).","Randy R: 64 (+28) featuring 7 blow-up holes — the worst single card of the season."],"body":"Tyler D was the clear standout on a day that had very little to offer everyone else. On a card where 36 blowup holes were spread across 27 players and the field average sat at 48.5, Tyler shot 38 — birdie on H3 (the par 5), clean through the rest, and 10+ strokes clear of the next sub-40 finisher. That's 10 rounds on the season now, 9 birdies (league leader), and a playoff HC of 5.76 that slots him at #6 in the standings. He's the most consistent performer in the field; on a day where consistency meant everything, he delivered.\n\nRocky M was the other positive story, posting a 41 (+5) to hold his #3 slot (HC 4.54). From there it was a traffic jam: Greg N, AJ B, and Ted F all carded 42s in what was a very compressed middle of the field. H1 wrecked people all night — averaging 5.74 across the field, nearly two full strokes over par. It's a par 4 and it played like a par 6. Nobody got a free opening hole.\n\nThe bottom of the card was heavy. Randy R turned in a 64 (+28) — 7 blowup holes, not a single hole below par — for the worst card of the season. Bob B's 60 and George's 59 kept him company. Twelve weeks in, the playoff math is tightening fast: Steve M (HC 1.70) and Nick W Jr. (HC 3.50) look increasingly locked at the top, while everything from Rocky M (HC 4.54) down through Tyler D (HC 5.76) is still very much a scramble. One scorching round from anyone in the 4–8 HC range and the leaderboard shifts."},"13":{"headline":"Week 13 — Gold Course, June 8 · Nick W Jr. and Steve M Pull Away","highlights":["Low gross: Nick W Jr. — 37 (+1), two birdies (H5, H7), zero blow-ups. Round of the week.","Sub-40 club: Nick W Jr. (37), Steve M (38), Ted F (39) — three players broke 40 on Gold.","24 players. Field averaged 47.1 (+11.1). Range 37 to 64.","6 birdies across the field: Nick W Jr. (H5, H7), Dan M (H7, H8), Ted F (H2), Jimmy Q (H2).","25 blow-ups logged — Oscar (7 blow-up holes, 63) and Randy R (5 blow-ups, 64) led the carnage.","Toughest hole: H1 (par 4) — field averaged 5.58 (+1.58). Nobody got a free opener.","Easiest hole: H7 (par 4) — field averaged 4.67 (+0.67), the lone relative soft spot.","Standings shake-up: Steve M (HC 1.33) and Nick W Jr. (HC 2.17) now sit a full 1.67 HC points clear of #3."],"body":"Nick W Jr. and Steve M put Week 13 in a different tier than most of the season. Nick's 37 on the Gold Course — two birdies, no blow-ups, clean through a card that beat up almost everyone else — was his best round of the year and dropped his playoff HC to 2.17. Steve added a 38 to his resume (his second sub-40 round on Gold), bringing his HC down to 1.33. Together they've now opened up a 1.67-point gap over #3 Rocky M (HC 3.84). That's not a gap that closes easily with the best-3-of-4 playoff format.\n\nThe Gold Course played tough but not brutally so — tougher than it looked at the top of the card. H1 averaged 5.58 across the field, nearly a stroke and a half over par, and set the tone for a rough night for the middle and back of the pack. Ted F was the other bright spot, posting a 39 with a birdie on H2 to solidify his standing at #7 (HC 4.60, 4 rounds). Dan M had the individual highlight of the evening with back-to-back birdies on H7 and H8, turning what was a sluggish front nine into a respectable 41. From there the field clogged fast — 10 players stuck between 44 and 48.\n\nThe bottom of the card held up its end of the season narrative. Oscar carded a 63 (+27) with 7 blow-up holes — the most in a single round all year — while Randy R answered with a 64 (+28) and 5 blow-ups including a 10 on H8. Between them they accounted for 12 of the day's 25 blow-ups. Thirteen regular weeks are in the books. The top two are separating. The battle for positions 3 through 7 between Rocky M, Matt D, Tyler D, Sean B, and Ted F is the real playoff story going forward."},"15":{"headline":"Week 15 — Red Course, June 22 · Eric B Takes the Week","highlights":["Low gross: Eric B — 41 (+5), the week's best card on the Red Course.","Greg N posted a 42 (+6) in second; Joe B and Tyler D both at 43 (+7).","10 players out. Field averaged 47.3 (+11.3). Range 41 to 57 — a 16-stroke spread.","Only 2 birdies across the field: Eric B (H6, par 5) and Joe B (H9, par 4).","11 blow-ups across 10 players — H4 (par 4) averaged 6.0 (+2.0), the week's wrecking ball.","Toughest hole: H4 (par 4) — field averaged 6.0 (+2.0). Nobody played it cleanly.","Easiest hole: H8 (par 4) — field averaged 4.6 (+0.6), the lone soft spot on the card.","Randy R: 57 (+21) with 4 blow-up holes — the week's most eventful card from tee to green."],"body":"Eric B grabbed the regular season finale and didn't let go. A 41 (+5) on the Red Course was the week's best round in a tight 10-man field that averaged +11.3 — on a day where the course bit back hard and only 2 birdies surfaced across 90 holes, clean golf separated him from the pack. He picked up a birdie on H6 (the par 5) and avoided the landmines the rest of the way. Efficient, quiet, effective.\n\nH4 was the card's defining hole, plain and simple. A par 4 that averaged 6.0 across the field — a full two strokes over par — with blow-ups up and down the scorecard. Joe B and Tyler D both came in at 43 (+7), which is respectable enough on a card like that. Joe grabbed a birdie on H9 to salvage some style points. Tyler played his 12th round of the season and comes out of it at HC 4.27 — the 43 sits just above his 41.33 average but doesn't change the standings picture much. He's #5, he's the league's birdie leader, and he's got résumé.\n\nFifteen weeks and 301 rounds in the books. Steve M (HC 1.20) and Nick W Jr. (HC 2.30) remain the class of the field with a gap that hasn't narrowed since Week 13. Rocky M (HC 3.84) holds the third spot ahead of a tight cluster — Matt D, Tyler D, and Sean B are all within a stroke of each other from #4 through #6. The best-3-of-4 playoff format means there's still everything to play for down that part of the board. Plenty of regular season left to sort it out."},"14":{"headline":"Week 14 — Blue Course, June 15 · AJ B and Steve M Share the Low","highlights":["Co-low gross: AJ B and Steve M — both shot 37 (+1), tied for round of the day on Blue.","Sub-40 club: AJ B (37), Steve M (37), Dan M (38) — three players broke 40 on Blue.","25 players. Field averaged 45.8 (+9.8). Range 37 to 67 — a punishing 30-stroke spread.","13 birdies across the field — the best birdie total in weeks. Tyler D led with 2 (H6, H7); H6 was birdied by 4 players.","29 blow-ups logged — H5 (par 5) was the week's villain, averaging 6.48 (+1.48) across the field.","Oscar M carded a 67 (+31) with a blow-up on every single hole — the worst single card of the season.","Tyler D went birdie-birdie (H6, H7) then torched an 8 on H9 (par 5) — finished 41 (+5).","AJ B's 37 was 6+ strokes better than his season average of 43.27 — the standout performance-vs-avg of the week."],"body":"AJ B and Steve M ran a two-man race to the top of the leaderboard on Blue, both signing for 37 (+1) in what turned into the cleanest co-low of the season. AJ's round was the bigger story — he's a 43.27 man on the year, so a 37 is a legitimate 6-stroke outperformance and the kind of card that reminds you why beer league is worth showing up for. Steve M just keeps doing what Steve M does: birdie on H8, nothing wasted, another quality round that tightens his grip on the #1 playoff spot (HC 1.20, avg 37.50 over 4 rounds). Dan M was quietly solid at 38 — his second sub-40 card in recent weeks and a round that keeps him comfortably in the top 10.\n\nThe Blue Course's H5 (par 5) ate the field alive. At an average of 6.48 — nearly one and a half strokes over par — it was the most punishing hole on the card and accounted for a chunk of the 29 blow-ups logged on the day. Tyler D found himself on both sides of the ledger: back-to-back birdies on H6 and H7 had him looking like the low-round leader, then H9 served up an 8 (par 5) that torpedoed the card to a 41. He's still #5 in the standings at HC 4.15 with 11 rounds of playoff résumé, but that one hole cost him. At the very back of the scorecard, Oscar M turned in a 67 (+31) — a blow-up on every single one of the nine holes, no exceptions — claiming the undisputed Disaster Card of the Season.\n\nFourteen weeks and 291 rounds in the books, and the playoff picture has been slowly crystallizing since Week 9. Steve M (HC 1.20) and Nick W Jr. (HC 2.30) have separated themselves at the top. Rocky M (HC 3.84) holds #3 but Matt D (HC 4.00, just 3 rounds) and Tyler D (HC 4.15, 11 rounds) are right there. The best-3-of-4 playoff format means anyone in the top 10 can still make noise — but they're going to have to play some golf."},"16":{"headline":"Week 16 — Gold Course, June 29 · Steve M Shoots Under His Age","highlights":["Co-low gross: Dan M and Steve M — both shot 39 (+3) to share round of the day honors on Gold.","Steve M shot under his age — a rare milestone in any league, on a Monday night in late June.","Sub-40 club: Dan M (39) and Steve M (39) — only two players cracked 40 on a card that averaged 47.9.","24 players. Field averaged 47.9 (+11.9). Range 39 to 69 — a 30-stroke spread from top to bottom.","Tyler D uncorked an eagle on H3 (2 on par 4) — one of the shots of the season. He now leads all players with 12 birdies on the year.","4 birdies/eagles on the day: Dan M (H1), Nick W Jr. (H2, par 5), Tyler D eagle (H3), Joe B (H6).","H9 (par 3) was the field's executioner — averaged 4.58 across 24 players (+1.58), the week's toughest hole by a wide margin.","Oscar M carded a 69 (+33) featuring blow-ups on 8 of 9 holes — another chapter in the season's most eventful card log."],"body":"Steve M doesn't birdie H9 to get there. He doesn't need to. He just plays clean, disciplined golf, and on Monday night on the Gold Course he did something that only a handful of golfers ever manage: he shot a number lower than his age. A 39 on a card that averaged nearly 48 is already impressive. That it landed below his birth year makes it a moment worth remembering. He shared the co-low with Dan M — also a 39, with a birdie on H1 offset by a blowup on H4 — in a final round that played tougher than the leaderboard top suggests. The sub-40 club had exactly two members all night, and the rest of the field paid for the difficulty.\n\nTyler D provided the shot of the night, maybe the shot of the season. A 2 on H3 — a par 4 on the Gold layout — is an eagle, and it lifted his season birdie total to 12, well clear of the field. He finished at 42 (+6), meaning the eagle was doing some real work just to get him there. H9 played the villain role all evening: a par 3 that averaged 4.58 across 24 players, a stroke and a half over par, with nowhere to hide. Nick W Jr. birdied H2 (4 on the par 5) to reach 10 birdies on the season. Joe B knocked in H6. Outside of those four bright spots, the Gold Course extracted its usual toll — 29 blowup holes logged across the field.\n\nSixteen weeks and 325 rounds in the books — and there's still plenty of regular season left before September. Steve M (HC 2.14) has built a convincing lead with a 37.80 average across 5 rounds, nearly two strokes better than anyone else in the league. Nick W Jr. (HC 4.09, 9 rounds) is the clear #2. Eric B (HC 4.20) holds #3 on just one round — fascinating math, impossible to rely on. Rocky M (HC 4.54), Matt D (HC 4.70), Ted F (HC 5.40), and Sean B (HC 5.42) round out a tight cluster from 4 through 7. Tyler D (#9, HC 6.31, 13 rounds) and Dan M (#11, HC 6.58, 13 rounds) bring the most volume of anyone outside the top tier. Season low remains Steve M's 36 from Week 10."},"17":{"headline":"Week 17 — Blue Course, July 6 · John S Ties the Season Low","highlights":["Low gross: John S — 36 (even par), opening with an eagle on H1 (a 2 on the par 4) and playing clean the rest of the way. Matches Steve M's Week 10 mark for the season's best round.","Sub-40 club: John S (36), Dan M (38), Steve M (39), Tyler D (39) — four players broke 40 on Blue.","22 players. Field averaged 46.4 (+10.4). Range 36 to 57.","7 birdies/eagles on the day: John S eagle (H1), Dan M (H5, H9), Tyler D (H5), Dave G (H2), Joe B (H2), John U (H2).","24 blow-ups logged — Oscar M's 57 (+21) included 5 blow-up holes, the week's most eventful card.","Toughest hole: H4 (par 4) — field averaged 5.55 (+1.55).","Easiest hole: H2 (par 4) — field averaged 4.55 (+0.55) — three of the field's seven birdies came there."],"body":"John S turned in the round of the season so far. An eagle on H1 — a 2 on the par-4 opener — set the tone, and he played the rest of the Blue Course clean for a 36, tying Steve M's Week 10 mark as the season low. It's a hell of a card, even if John's 7.75 HC and 44.07 season average mean it doesn't reshuffle the standings — he's proof that on any given Monday, anyone can go low.\n\nBehind him, the mid-pack regulars did what they do. Dan M (#7, HC 6.22) and Tyler D (#8, HC 6.27) both broke 40, keeping their grip on the back half of the top 10 with 15 and 14 rounds of resume, respectively. The Blue Course's H4 was the villain again — 5.55 average, a stroke and a half over par — while H2 played almost a full stroke easier and picked up three of the day's seven birdies (Dave G, Joe B, John U).\n\nSeventeen weeks in, the top of the leaderboard hasn't moved: Steve M and Nick W Jr. remain well clear at 1 and 2, with Eric B's single-round #3 spot still the field's favorite oddity. Oscar M continued his rough stretch with another blow-up-heavy card (57, +21, 5 blow-up holes) — not his worst of the year, but keeping good company with his Week 14 and Week 16 disasters."},"18":{"headline":"Week 18 — Red Course, July 13 · Nick W Jr. Leads a Tough Field","highlights":["Low gross: Nick W Jr. — 37 (+1), with birdies on H6 and H8. Round of the week.","Sub-40 club: Nick W Jr. (37), Steve M (38), Dan M (39) — only three players broke 40 on a brutal Red Course card.","24 players. Field averaged 47.7 (+11.7) — one of the toughest field days of the season.","Just 6 birdies against 35 blow-ups — the worst birdie-to-blowup ratio in weeks.","Toughest hole: H4 (par 4) — field averaged 5.79 (+1.79). Nobody escaped clean.","Easiest hole: H8 (par 4) — field averaged 4.71 (+0.71), the lone relative soft spot.","Kerry M: 60 (+24) with 4 blow-up holes — the week's most eventful card.","Dan M's birdie on H3 helped him to a 39 (+3), good for 3rd on the day."],"body":"Nick W Jr. handled a difficult Red Course better than anyone, carding a clean 37 with birdies on H6 and H8. It's another quality round to add to a 10-round resume that already had him locked at #2 in the standings (HC 3.92) — and it stretches his cushion over the pack behind him. Steve M wasn't far off with a 38, keeping his #1 spot (HC 2.50, 7 rounds) very much intact. Between the two of them, the top of the leaderboard remains as settled as it's been all year.\n\nEverybody else had to grind. The field averaged 47.7 — nearly 12 over par — on a card where H4 played almost two strokes tough all night and only 6 birdies surfaced across 24 players against 35 blow-up holes. Dan M's birdie on H3 was enough to get him to 39 (+3) and a 3rd-place finish on the day, keeping his #7 season spot (HC 6.22) solid. At the other end, Kerry M's 60 (+24) with 4 blow-up holes was the roughest card of the night.\n\nEighteen weeks and 371 regular rounds are in the books, with the September 14 playoffs still two months out. Steve M and Nick W Jr. remain the class of the field, Eric B's one-round #3 still looms as an unresolved question mark, and Gary B and Sean E have now pulled level atop the iron-man leaderboard at 16 rounds apiece."},"19":{"headline":"Week 19 — Gold Course, July 20 · Nick W Jr. Cards Even Par","highlights":["Low gross: Nick W Jr. — 36 (E), the only player to reach par on the Gold. Round of the season.","Close behind: Greg N (37, +1), birdie on H1. Sub-40 club: Nick W Jr., Greg N, Dan M / Tyler D / Sean B (39).","27 players. Field averaged 45.2 (+9.2). Range 36 to 55.","A reminder to all players: please turn in your scorecards by 6:00 PM at the Slam — especially if your group is already in."],"body":"Nick W Jr. went out and did something special — a clean 36 (even par) on the Gold Course, the only player to match par all night. Greg N was right behind with a 37 (+1), carding a birdie on the par-4 first hole. Dan M, Tyler D, and Sean B all came in at 39 (+3) to round out the sub-40 club. 27 players made the trip out to the Gold, with the field averaging 45.2. Strong showing all around.\n\nReminder: please turn in your scorecard by 6:00 PM at the Slam — even if your group is already in, stragglers hold everything up."}}},"contacts":[{"scoreId":"AJ B","name":"AJ Bachner","tees":"White","phone":"Not Shared","email":"alanbachner@gmail.com"},{"scoreId":"Bob B","name":"Bob Burdzy","tees":"Gold","phone":"Not Shared","email":"robert.burdzy@yahoo.com"},{"scoreId":"Brian P","name":"Brian Pail","tees":"White","phone":"Not Shared","email":"brianpail1963@gmail.com"},{"scoreId":"Chris B","name":"Chris Bielinski","tees":"White","phone":"Not Shared","email":"cbielins@gmail.com"},{"scoreId":"Dan B","name":"Dan Baxter","tees":"Gold","phone":"4124984853","email":"dbaxter1@gmail.com"},{"scoreId":"Dan M","name":"Dan Myers","tees":"White","phone":"7248845511","email":"arp1407@gmail.com"},{"scoreId":"Dave G","name":"Dave Gordon","tees":"Gold","phone":"Not Shared","email":"dgordon@gordico.com"},{"scoreId":"Gary B","name":"Gary Bonn","tees":"Gold","phone":"Not Shared","email":"gbonn1036@gmail.com"},{"scoreId":"Geno K","name":"Geno Koop","tees":"Gold","phone":"Not Shared","email":"gwkoop@comcast.net"},{"scoreId":"Greg N","name":"Greg Nardine","tees":"White","phone":"Not Shared","email":"gwn104@gmail.com"},{"scoreId":"Harry H","name":"Harry Hanna","tees":"Gold","phone":"Not Shared","email":"harry@drhanna.com"},{"scoreId":"Jimmy Q","name":"Jimmy Quidetto","tees":"Gold","phone":"Not Shared"," // ===== Tab system =====
let seen = new Set(), charts = {};
function show(id, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (btn) btn.classList.add('active');
  const mb = document.getElementById('moreBtn');
  if (mb && btn !== mb) mb.classList.remove('active');
  if (!seen.has(id)) { renderTab(id); seen.add(id); }
}
function showMore(id) {
  show(id, null);
  document.getElementById('moreBtn').classList.add('active');
  document.getElementById('moreDrop').classList.remove('open');
}
function toggleMore() {
  const drop = document.getElementById('moreDrop');
  const btn = document.getElementById('moreBtn');
  if (drop.classList.contains('open')) {
    drop.classList.remove('open');
  } else {
    const r = btn.getBoundingClientRect();
    drop.style.top = r.bottom + 'px';
    drop.style.right = (window.innerWidth - r.right) + 'px';
    drop.classList.add('open');
  }
}
document.addEventListener('click', function(e) {
  const w = document.getElementById('moreWrap');
  const d = document.getElementById('moreDrop');
  if (w && d && !w.contains(e.target) && !d.contains(e.target)) d.classList.remove('open');
});
function renderTab(id) {
  ({standings:rStandings, recap:rRecap, weekly:rWeekly, players:rPlayers,
    partners:rPartners, bff:rBFF, courses:rCourses, montecarlo:rMC, qualwatch:rQualWatch, playoffs:rPlayoffs, champions:rChampions,
    contacts:rContacts, email:rEmail, xlexport:rExport})[id]?.();
}

// ===== Helpers =====
const fmt   = (v,d=1) => v==null?'—':(typeof v==='number'?v.toFixed(d):v);
const sign  = v => v==null?'—':(v>=0?'+':'')+v.toFixed(1);
const isChamp = p => D.champions.includes(p);
const isQual  = p => { const s=D.standings.find(x=>x.player===p); return s&&(s.rounds>=D.roundsNeeded||isChamp(p)); };
function hcls(h,par){
  if(!h||!par) return '';
  if(h<par) return 'h-bir';
  if(h===par) return 'h-par';
  if(h===par+1) return 'h-bog';
  if(h>=2*par) return 'h-blw';
  return 'h-dbl';
}
function dfmt(ds,opts){
  try{return new Date(ds+'T12:00:00').toLocaleDateString('en-US',opts||{month:'short',day:'numeric'});}
  catch{return ds;}
}
function statCards(items){
  return '<div class="stat-row">'+items.map(([val,lbl,cls,sty])=>
    `<div class="stat-card"><div class="stat-val${cls?' '+cls:''}"${sty?` style="${sty}"`:''}>${val}</div><div class="stat-lbl">${lbl}</div></div>`
  ).join('')+'</div>';
}

// ===== STANDINGS =====
function rStandings() {
  const el = document.getElementById('standings');
  const W = D.weekly, last = W[W.length-1]||{}, ldr = D.standings[0];
  let rows = '';
  D.standings.forEach(s=>{
    const ch=isChamp(s.player), q=s.rounds>=D.roundsNeeded;
    const badge = ch?'<span class="badge b-gold">★ Champ</span>'
      :q?'<span class="badge b-g">✓ Qualified</span>'
        :`<span class="badge b-mu">${D.roundsNeeded-s.rounds} to go</span>`;
    const opCls = s.avgOverPar<=5?'g':s.avgOverPar<=10?'gd':'r';
    rows+=`<tr class="${ch?'row-champ':q?'row-qual':''}">
      <td class="rk">${s.rank}</td><td class="pl">${s.player}${ch?' ★':''}</td>
      <td>${s.rounds}</td><td>${fmt(s.avg)}</td>
      <td class="${opCls}">${sign(s.avgOverPar)}</td>
      <td class="g">${s.best||'—'}</td><td class="r">${s.worst||'—'}</td>
      <td>${s.qualifiedPartners}<span class="mu">/${s.uniquePartners}</span></td><td class="hc">${fmt(s.playoffHC)}</td>
      <td>${badge}</td></tr>`;
  });
  el.innerHTML = statCards([
    [D.standings.length,'Players'],
    [W.length,'Weeks Played'],
    [ldr?.player||'—','Current Leader'],
    [fmt(ldr?.playoffHC),'Leader HC','g'],
    [last.course||'—','Last Course'],
    [dfmt(last.date,{month:'short',day:'numeric'}),'Last Played'],
  ])+`<div class="card"><div class="card-title">Season Standings</div>
  <div class="card-sub">Partners column shows qualifying partners / total unique partners — only qualifying partners (10+ rounds, or a defending champion) earn a bonus stroke.</div>
  <div class="tbl-wrap"><table class="dtbl">
    <thead><tr><th>Rank</th><th>Player</th><th>Rds</th><th>Avg</th><th>Avg +/-</th>
    <th>Best</th><th>Worst</th><th>Partners</th><th>HC</th><th>Status</th></tr></thead>
    <tbody>${rows}</tbody></table></div></div>`;
}

// ===== QUALIFICATION WATCH =====
function rQualWatch() {
  const el = document.getElementById('qualwatch');
  const qw = D.qualificationWatch;
  if (!qw) { el.innerHTML = ''; return; }
  const endLabel = dfmt(qw.seasonEndDate,{month:'short',day:'numeric'});
  const cards = statCards([
    [qw.remainingWeeks,'Weeks Left to Qualify'],
    [endLabel,'Last Qualifying Week'],
    [qw.qualifiedCount,'Already Qualified','g'],
    [qw.stillAlive.length,'Still Alive'],
    [qw.eliminated.length,'Eliminated','r'],
  ]);
  const aliveRows = qw.stillAlive.map(s=>{
    const slackCls = s.slack<=1?'r':s.slack<=3?'gd':'g';
    return `<tr><td class="pl">${esc(s.player)}</td><td>${s.rounds}</td>
      <td>${s.roundsShort} of ${qw.remainingWeeks}</td>
      <td class="${slackCls}">${s.slack}</td>
      <td class="hc">${fmt(s.playoffHC)}</td></tr>`;
  }).join('');
  const elimRows = qw.eliminated.map(s=>
    `<tr><td class="pl">${esc(s.player)}</td><td>${s.rounds}</td><td>${s.maxPossible}</td></tr>`
  ).join('');
  el.innerHTML = cards + `
    <div class="card"><div class="card-title">🎯 Still Alive — Sorted by Tightest Margin</div>
    <div class="card-sub">Needs to play in most of the remaining ${qw.remainingWeeks} week${qw.remainingWeeks===1?'':'s'} (by ${endLabel}) to reach ${D.roundsNeeded} rounds and qualify. "Cushion" is how many of those weeks they can skip and still make it.</div>
    <div class="tbl-wrap"><table class="dtbl">
      <thead><tr><th>Player</th><th>Rounds</th><th>Rounds Needed</th><th>Cushion</th><th>HC</th></tr></thead>
      <tbody>${aliveRows || '<tr><td colspan="5" class="mu">Nobody in this bucket right now.</td></tr>'}</tbody>
    </table></div></div>
    ${qw.eliminated.length ? `<div class="card"><div class="card-title">🚫 Mathematically Eliminated</div>
    <div class="card-sub">Can no longer reach ${D.roundsNeeded} rounds even by playing every remaining week — no bonus stroke is earned by their partners for rounds played with them.</div>
    <div class="tbl-wrap"><table class="dtbl">
      <thead><tr><th>Player</th><th>Rounds Played</th><th>Max Possible</th></tr></thead>
      <tbody>${elimRows}</tbody>
    </table></div></div>` : ''}`;
}

function rRecapBody(week) {
  const w  = D.weekly.find(x=>x.week===week);
  const cm = D.commentary.weeklyRecaps?.[String(week)];
  if(!w){ document.getElementById('rc-body').innerHTML=''; return; }

  const pars = (D.courseStats[w.course]?.holes||[]).map(h=>h.par);
  const longDate = dfmt(w.date,{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const cards = statCards([
    [longDate,'Date'],
    [w.course,'Course'],
    [w.count,'Players'],
    [w.fieldAvg||'—','Field Avg'],
    ['+'+(w.fieldAvgOP||'—'),'Avg Over Par'],
    [w.birdies,'🐦 Birdies','g'],
    [w.blowups,'💥 Blow-ups','r'],
    [w.low||'—','Low Gross','g'],
  ]);

  let commentary = '';
  if(cm) {
    const hl = cm.headline?`<div class="recap-hl">${esc(cm.headline)}</div>`:'';
    const pts = cm.highlights?.length
      ?`<ul class="recap-pts">${cm.highlights.map(h=>`<li>${esc(h)}</li>`).join('')}</ul>`:'';
    const body = cm.body?.trim()?`<div class="recap-body">${esc(cm.body)}</div>`:'';
    if(hl||pts||body) commentary = `<div class="card">${hl}${pts}${body}</div>`;
  } else {
    commentary = '<div class="card"><p class="no-recap">No recap added for this week yet. Edit BeerLeague_Commentary.json to add one.</p></div>';
  }

  // Net leaderboard — top 5 by total
  const top5 = w.rows.slice(0,5);
  let netRows = top5.map((r,i)=>{
    const op=r.overPar; const opCls=op<=2?'g':op<=7?'gd':'r';
    return `<tr><td class="rk">${i+1}</td><td class="pl">${r.player}</td>
      <td class="tot">${r.total||'—'}</td>
      <td class="${opCls}">${op!=null?(op>=0?'+':'')+op:'—'}</td></tr>`;
  }).join('');

  document.getElementById('rc-body').innerHTML = cards + commentary + `
    <div class="two-col">
      <div class="card"><div class="card-title">Gross Leaderboard — Week ${week}</div>
        <div class="tbl-wrap"><table class="dtbl">
          <thead><tr><th>#</th><th>Player</th><th>Gross</th><th>+/-</th></tr></thead>
          <tbody>${netRows}</tbody></table></div></div>
      <div class="card"><div class="card-title">Full Scorecard</div>
        <div class="tbl-wrap">${buildScorecard(w,pars)}</div></div>
    </div>`;
}
function buildScorecard(w, pars) {
  const parCells = pars.map(p=>`<td class="pc">${p}</td>`).join('');
  let rows = w.rows.map(r=>{
    const cells = r.holes.map((h,i)=>`<td class="hc-cell ${hcls(h,pars[i])}">${h||'—'}</td>`).join('');
    const op=r.overPar; const opCls=op<=2?'g':op<=7?'gd':'r';
    return `<tr><td class="pl">${r.player}</td>${cells}
      <td class="tot">${r.total||'—'}</td>
      <td class="${opCls}">${op!=null?(op>=0?'+':'')+op:'—'}</td></tr>`;
  }).join('');
  return `<table class="dtbl">
    <thead>
      <tr><th>Player</th><th>H1</th><th>H2</th><th>H3</th><th>H4</th><th>H5</th>
        <th>H6</th><th>H7</th><th>H8</th><th>H9</th><th>Total</th><th>+/-</th></tr>
      <tr class="par-hdr"><td>Par</td>${parCells}<td>36</td><td></td></tr>
    </thead><tbody>${rows}</tbody></table>`;
}

// ===== PLAYERS =====
function genRndRecap(r,playerAvg,wMap,best,worst){
  const w=wMap[r.week],fAvg=w?w.fieldAvg:null;
  const pts=[];
  if(r.total===best&&r.total===worst)pts.push('Only round this season');
  else if(r.total===best)pts.push('Season best');
  else if(r.total===worst)pts.push('Season worst');
  if(fAvg){const d=Math.round(r.total-fAvg);
    if(d<=-4)pts.push('Dominated the field by '+(-d));
    else if(d<=-2)pts.push('Beat field avg by '+(-d));
    else if(d<=-1)pts.push('Edged field avg');
    else if(d>=5)pts.push((+d)+' over field avg');
    else if(d>=2)pts.push('Near/above field avg');
    else pts.push('Right at field avg');
  }
  if(r.br>=3)pts.push(r.br+' birdies');else if(r.br===2)pts.push('2 birdies');else if(r.br===1)pts.push('1 birdie');
  if(r.bl>=3)pts.push(r.bl+' blow-ups');else if(r.bl===2)pts.push('2 blow-ups');else if(r.bl===1)pts.push('1 blow-up');
  return pts.slice(0,3).join(' · ')||'Average round';
}
function genSeasonNarr(name,s,h,rounds,avg,ch,q,tees){
  const valid=rounds.map(r=>r.total).filter(Boolean);
  const last3=valid.slice(-3);
  const trend=last3.length>=2?last3[last3.length-1]-last3[0]:0;
  const rDesc=s.rank<=3?'in the top three':s.rank<=8?'in the top 10':s.rank<=18?'in the middle of the pack':'towards the bottom of the standings';
  const tDesc=trend<=-2?'improving over recent weeks':trend>=2?'showing some struggles in recent rounds':'holding steady';
  const sDesc=ch?'a past champion in this league':q?'on track to qualify for the playoffs':`${D.roundsNeeded-s.rounds} more round${D.roundsNeeded-s.rounds!==1?'s':''} still needed to qualify`;
  const bestRnd=rounds.find(r=>r.total===s.best),worstRnd=rounds.find(r=>r.total===s.worst);
  const teesStr=tees&&tees!=='—'?` Playing off the ${tees} tees.`:'';
  let t=`${name} sits at #${s.rank} in the standings with a ${avg.toFixed(1)} avg (+${s.avgOverPar.toFixed(1)}) over ${s.rounds} round${s.rounds!==1?'s':''}, placing ${rDesc}.${teesStr}`;
  if(s.best&&rounds.length>1){
    t+=` Best round of the season: a ${s.best} in Week ${bestRnd?.week||'?'} at ${bestRnd?.course||'?'}`;
    if(s.worst&&s.worst!==s.best)t+=` (worst: ${s.worst} in Week ${worstRnd?.week||'?'}).`;
    else t+='.';
  }
  t+=` ${h.birdies} birdie${h.birdies!==1?'s':''} and ${h.blowups} blow-up${h.blowups!==1?'s':''} on the season.`;
  t+=` Currently ${tDesc} — ${sDesc}.`;
  return t;
}
let selPl = null;
function rPlayers() {
  const el = document.getElementById('players');
  selPl = selPl || D.standings[0]?.player;
  const opts = D.standings.map(s=>s.player).sort().map(p=>`<option value="${p}"${p===selPl?' selected':''}>${p}</option>`).join('');
  el.innerHTML = `<div class="sel-row"><label>Select Player:</label><select onchange="selPlCh(this.value)">${opts}</select></div><div id="pl-body"></div>`;
  rPlBody(selPl);
}
function selPlCh(n){ selPl=n; rPlBody(n); }
function rPlBody(name) {
  const s=D.standings.find(x=>x.player===name), h=D.playerHistory[name];
  if(!s||!h) return;
  const ch=isChamp(name), q=s.rounds>=D.roundsNeeded||ch;
  const rounds=h.rounds, sc=rounds.map(r=>r.total), valid=sc.filter(Boolean);
  const avg = valid.reduce((a,b)=>a+b,0)/(valid.length||1);
  const wMap={}; D.weekly.forEach(w=>{wMap[w.week]=w;});
  const stdDev = valid.length > 1 ? Math.sqrt(valid.reduce((a,b)=>a+Math.pow(b-avg,2),0)/valid.length) : 0;
  const normalRange = valid.length > 1 ? `${Math.round(avg-stdDev)}–${Math.round(avg+stdDev)}` : '—';
  const banner = ch?'<div class="banner bn-gold">★ Past Champion</div>'
    :q?'<div class="banner bn-g">✓ Playoff Qualified</div>'
      :`<div class="banner bn-mu">Needs ${D.roundsNeeded-s.rounds} more round(s) to qualify</div>`;
  const ctContact = D.contacts.find(c=>c.scoreId===name);
  const plTees = ctContact?.tees||'—';
  const cards = statCards([
    ['#'+s.rank,'Season Rank'],[s.rounds,'Rounds'],
    [fmt(s.avg),'Avg Score'],[sign(s.avgOverPar),'Avg +/-'],
    [fmt(s.playoffHC),'Playoff HC','g'],
    [s.best||'—','Best Round','g'],[s.worst||'—','Worst Round','r'],
    [normalRange,'Normal Range'],
    [s.uniquePartners,'Partners'],['🐦 '+h.birdies,'Season Birdies','g'],
    ['💥 '+h.blowups,'Season Blow-ups','r'],
    [plTees,'Tees'],
  ]);
  const seasNarr=genSeasonNarr(name,s,h,rounds,avg,ch,q,plTees);
  let rrows = rounds.map(r=>{
    const op=r.overPar; const opc=op<=2?'g':op<=7?'gd':'r';
    const rc=genRndRecap(r,avg,wMap,s.best,s.worst);
    return `<tr><td>W${r.week}</td><td>${dfmt(r.date)}</td><td>${r.course}</td>
      <td class="tot">${r.total||'—'}</td>
      <td class="${opc}">${op!=null?(op>=0?'+':'')+op:'—'}</td>
      <td>${r.br>0?`<span class="g">🐦 ${r.br}</span>`:'—'}</td>
      <td>${r.bl>0?`<span class="r">💥 ${r.bl}</span>`:'—'}</td>
      <td class="mu" style="font-size:.76rem;white-space:normal;max-width:180px;line-height:1.4;">${rc}</td></tr>`;
  }).join('');
  const scoreDist={eagle:0,birdie:0,par:0,bogey:0,double:0,higher:0};
  rounds.forEach(r=>{
    const pars=(D.courseStats[r.course]?.holes||[]).map(h=>h.par);
    r.holes.forEach((h,i)=>{
      if(!h||!pars[i]) return;
      const d=h-pars[i];
      if(d<=-2) scoreDist.eagle++; else if(d===-1) scoreDist.birdie++;
      else if(d===0) scoreDist.par++; else if(d===1) scoreDist.bogey++;
      else if(d===2) scoreDist.double++; else scoreDist.higher++;
    });
  });
  const totalHoles=Object.values(scoreDist).reduce((a,b)=>a+b,0);
  const distLabels=['Eagle','Birdie','Par','Bogey','Double','Triple+'];
  const distCounts=[scoreDist.eagle,scoreDist.birdie,scoreDist.par,scoreDist.bogey,scoreDist.double,scoreDist.higher];
  const distColors=['#ffd700','#3fb950','#58a6ff','#f0a040','#f85149','#c94040'];
  document.getElementById('pl-body').innerHTML = cards+banner+`
    <div class="card"><div class="card-title">Season Snapshot</div>
      <p class="season-notes" style="line-height:1.85;font-size:.9rem;">${seasNarr}</p></div>
    <div class="two-col">
      <div class="card"><div class="card-title">Score Trend</div>
        <div class="chart-wrap"><canvas id="pl-chart"></canvas></div></div>
      <div class="card"><div class="card-title">Score Distribution</div>
        <div class="chart-wrap" style="height:240px"><canvas id="pl-pie-chart"></canvas></div></div>
    </div>
    <div class="card"><div class="card-title">Round History</div>
      <div class="tbl-wrap"><table class="dtbl">
        <thead><tr><th>Week</th><th>Date</th><th>Course</th><th>Gross</th><th>+/-</th><th>Birdies</th><th>Blow-ups</th><th>Recap</th></tr></thead>
        <tbody>${rrows}</tbody></table></div></div>`;
  if(charts.pl) charts.pl.destroy();
  if(charts.plPie) charts.plPie.destroy();
  const ctx=document.getElementById('pl-chart').getContext('2d');
  charts.pl=new Chart(ctx,{type:'line',data:{
    labels:rounds.map(r=>`W${r.week}(${r.course[0]})`),
    datasets:[{
      label:'Gross Score',data:sc,borderColor:'#3fb950',backgroundColor:'rgba(63,185,80,.07)',
      tension:.35,pointRadius:5,
      pointBackgroundColor:sc.map(v=>v&&v<=avg?'#3fb950':'#f85149'),
      pointBorderColor:'#0d1117',pointBorderWidth:2,
    },{
      label:'Season Avg',data:sc.map(()=>Math.round(avg*10)/10),
      borderColor:'#444c56',borderDash:[5,4],pointRadius:0,tension:0,
    }]
  },options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#8b949e',font:{size:11}}}},
    scales:{
      y:{ticks:{color:'#8b949e'},grid:{color:'#21262d'},
         min:Math.min(...valid)-4,max:Math.max(...valid)+4},
      x:{ticks:{color:'#8b949e'},grid:{color:'#21262d'}}
    }
  }});
  const pieCtx=document.getElementById('pl-pie-chart').getContext('2d');
  charts.plPie=new Chart(pieCtx,{type:'doughnut',data:{
    labels:distLabels,
    datasets:[{data:distCounts,backgroundColor:distColors,borderColor:'#21262d',borderWidth:2}]
  },options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{
      legend:{position:'right',labels:{color:'#8b949e',font:{size:10},padding:8,
        filter:(item,data)=>data.datasets[0].data[item.index]>0}},
      tooltip:{callbacks:{label:tc=>{const n=tc.raw,pct=totalHoles?((n/totalHoles)*100).toFixed(1):0;return ` ${tc.label}: ${n} (${pct}%)`;}}}
    }
  }});
}

function selPPCh(n){ selPP=n; rPPBody(n); hlRow(n); }
function rPPBody(name) {
  const mx=D.partnerMatrix[name]||{};
  const partners=Object.entries(mx).filter(([p,n])=>p!==name&&n>0).sort((a,b)=>b[1]-a[1]);
  const s=D.standings.find(x=>x.player===name), most=partners[0];
  const cards=statCards([[partners.length,'Unique Partners'],[s?.rounds||'—','Rounds Played'],[most?.[0]||'—','Most Rounds With'],[most?.[1]||'—','Rounds Together']]);
  const maxN=most?.[1]||1;
  let prows=partners.map(([p,n])=>`
    <tr><td class="pl">${p}</td><td>
      <div class="bar-row"><div class="bar-fill" style="width:${Math.round(n/maxN*110)}px"></div>
      <span>${n} round${n>1?'s':''}</span></div></td></tr>`).join('');
  if(!prows) prows='<tr><td colspan="2" class="mu">No partner data</td></tr>';
  document.getElementById('pp-body').innerHTML=cards+`
    <div class="card"><div class="card-title">Partners This Season — ${name}</div>
      <div class="tbl-wrap"><table class="dtbl">
        <thead><tr><th>Partner</th><th>Rounds Together</th></tr></thead>
        <tbody>${prows}</tbody></table></div></div>`;
}
function rMatrix() {
  const P=D.partnerPlayers; if(!P.length) return;
  let h='<thead><tr><th class="mcol"></th>'+P.map(p=>`<th class="mcol" title="${p}">${p.split(' ')[0]}</th>`).join('')+'</tr></thead><tbody>';
  P.forEach(rp=>{
    const rd=D.partnerMatrix[rp]||{};
    h+=`<tr data-rp="${rp}"><th class="mrow" onclick="selPPCh('${esc2(rp)}');document.querySelector('.sel-row select').value='${esc2(rp)}'">${rp}</th>`;
    P.forEach(cp=>{
      if(rp===cp){h+=`<td class="mself">—</td>`;return;}

// ===== BFF =====
function rBFF() {
  const el = document.getElementById('bff');
  const P = D.partnerPlayers;
  const pairs = [];
  const seenP = new Set();
  P.forEach(a => {
    const row = D.partnerMatrix[a] || {};
    Object.entries(row).forEach(([b, n]) => {
      if (a === b || n <= 0) return;
      const key = [a, b].sort().join('|||');
      if (seenP.has(key)) return;
      seenP.add(key);
      pairs.push({ a, b, rounds: n });
    });
  });
  pairs.sort((x, y) => y.rounds - x.rounds);
  const topPair = pairs[0];
  const cards = statCards([
    [topPair ? topPair.a.split(' ')[0] + ' & ' + topPair.b.split(' ')[0] : '—', 'Top BFF Pair', 'g'],
    [topPair ? topPair.rounds : '—', 'Rounds Together', 'g'],
    [pairs.length, 'Unique Pairings'],
    [pairs.filter(p => p.rounds >= 3).length, 'Pairs (3+ Rounds)'],
  ]);
  const rows = pairs.map((p, i) => {
    const medal = i === 0 ? '<span class="gd">★</span> ' : i === 1 ? '<span class="mu">✦</span> ' : i === 2 ? '<span style="color:#cd7f32">✦</span> ' : '';
    return `<tr class="${i === 0 ? 'row-champ' : i < 3 ? 'row-qual' : ''}">
      <td class="rk">${i + 1}</td>
      <td class="pl">${medal}${esc(p.a)}</td>
      <td class="pl">${esc(p.b)}</td>
      <td class="tot">${p.rounds}</td>
      <td><div class="bar-row"><div class="bar-fill" style="width:${Math.round(p.rounds / (topPair?.rounds || 1) * 130)}px"></div></div></td>
    </tr>`;
  }).join('');
  el.innerHTML = cards + `
    <div class="card">
      <div class="card-title">💚 Best Friends Forever — Most Rounds Together</div>
      <div class="card-sub">All player pairs ranked by rounds played in the same group</div>
      <div class="tbl-wrap"><table class="dtbl">
        <thead><tr><th>#</th><th>Player A</th><th>Player B</th><th>Rounds</th><th></th></tr></thead>
        <tbody>${rows || '<tr><td colspan="5" class="mu">No partner data yet</td></tr>'}</tbody>
      </table></div>
    </div>`;
}

let selC='Red'; let selTee='White';
function rCourses() {

function selCCh(n){ selC=n; document.querySelectorAll('#courses .seg').forEach(b=>b.classList.toggle('active',b.textContent===n)); rCBody(n); }
function rCBody(name) {
  const cs=D.courseStats[name]; if(!cs) return;
  const ld=LINDENWOOD[name];
  const holes=cs.holes;
  const hard=[...holes].sort((a,b)=>(b.avgOP||0)-(a.avgOP||0))[0];
  const easy=[...holes].sort((a,b)=>(a.avgOP||0)-(b.avgOP||0))[0];
  const cards=statCards([
    [fmt(cs.avgTotal,1),'Field Avg'],['+'+(cs.avgOP||'?'),'Avg Over Par'],
    ['H'+(hard?.hole||'?'),'Hardest ('+sign(hard?.avgOP)+')','r'],
    ['H'+(easy?.hole||'?'),'Easiest ('+sign(easy?.avgOP)+')','g'],
  ]);
  let trows=holes.map(h=>{
    const cls=h.avgOP<=.6?'g':h.avgOP<=1.3?'gd':'r';
    return `<tr><td>Hole ${h.hole}</td><td>Par ${h.par}</td><td>${fmt(h.avg,2)}</td>
      <td class="${cls}">${sign(h.avgOP)}</td><td class="mu">${h.n} rounds</td></tr>`;
  }).join('');
  // Scorecard with tee selector and hole notes
  let scCard='';
  if(ld){
    const teeNames=Object.keys(ld.tees);
    const teeBtns=teeNames.map(t=>`<button class="seg${t===selTee?' active':''}" onclick="selTee='${t}';rCBody('${name}')" style="padding:.28rem .6rem;font-size:.75rem">${t}</button>`).join('');
    const scRows=ld.par.map((par,i)=>{
      const h=i+1;
      const yds=(ld.tees[selTee]||[])[i]??'—';
      const tip=ld.tips?.[h]||'';
      const holeOP=cs.holes[i]?.avgOP;
      const oc=holeOP==null?'':holeOP<=.6?'g':holeOP<=1.3?'gd':'r';
      return `<tr><td class="hc-cell">${h}</td><td class="hc-cell">${par}</td><td class="hc-cell mu">${ld.hcp[i]}</td><td class="hc-cell">${yds}</td><td class="hc-cell ${oc}">${sign(holeOP)}</td><td style="font-size:.72rem;color:var(--muted);white-space:normal;line-height:1.4;max-width:260px">${tip}</td></tr>`;
    }).join('');
    const totYds=(ld.tees[selTee]||[]).reduce((a,b)=>a+b,0)||'—';
    const totPar=ld.par.reduce((a,b)=>a+b,0);
    scCard=`<div class="card"><div class="card-title">${name} — Scorecard</div>
      <div style="color:var(--muted);font-size:.8rem;margin-bottom:.65rem">${ld.desc}</div>
      <div class="btn-row" style="margin-bottom:.7rem">${teeBtns}</div>
      <div class="tbl-wrap"><table class="dtbl"><thead><tr><th>Hole</th><th>Par</th><th>HCP</th><th>${selTee} Yds</th><th>Field +/-</th><th>Notes</th></tr></thead>
      <tbody>${scRows}<tr style="background:var(--s2)"><td><strong>Total</strong></td><td><strong>${totPar}</strong></td><td>—</td><td><strong>${totYds}</strong></td><td class="${cs.avgOP>12?'r':'gd'}"><strong>+${cs.avgOP}</strong></td><td></td></tr></tbody></table></div></div>`;
    if(ld.rules?.length){
      scCard+=`<div class="card"><div class="card-title">Special Rules — ${name} Nine</div>${ld.rules.map(r=>`<div style="font-size:.86rem;color:var(--text);margin-bottom:.45rem">${r}</div>`).join('')}</div>`;
    }
  }
  // 18-hole combo ratings
  const relCombos=COMBOS.filter(c=>c.front===name||c.back===name);
  const comboHtml=relCombos.map(combo=>{
    const rows=combo.tees.map(t=>`<tr><td>${t.tee}</td><td>${t.yds.toLocaleString()}</td><td>${t.rating}</td><td>${t.slope}</td></tr>`).join('');
    return `<div class="card"><div class="card-title">18-Hole Combo: ${combo.name}</div><div class="card-sub">${combo.front} front · ${combo.back} back</div><div class="tbl-wrap"><table class="dtbl"><thead><tr><th>Tee</th><th>Yards</th><th>Rating</th><th>Slope</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  }).join('');
  // Universal course rules
  const univRules=`<div class="card"><div class="card-title">Course Rules</div><div style="display:grid;grid-template-columns:auto 1fr;gap:.3rem .75rem;font-size:.84rem;color:var(--text);align-items:center"><span>🔴</span><span>Red flag = front hole position</span><span>⚪</span><span>White flag = middle hole position</span><span>🟡</span><span>Gold flag = back hole position</span><span>📏</span><span>Yardages measured to center of green</span><span>🍺</span><span>No outside beer, liquor, or food on property</span></div></div>`;
  document.getElementById('cs-body').innerHTML=cards+`
    <div class="card"><div class="card-title">${name} — Hole Difficulty</div>
      <div class="chart-wrap"><canvas id="cs-chart"></canvas></div></div>
    <div class="card"><div class="card-title">Hole Details</div>
      <div class="tbl-wrap"><table class="dtbl">
        <thead><tr><th>Hole</th><th>Par</th><th>Avg Score</th><th>Avg +/-</th><th>Rounds</th></tr></thead>
        <tbody>${trows}</tbody></table></div></div>
    ${scCard}${comboHtml}${univRules}`;
  if(charts.course) charts.course.destroy();
  const ctx=document.getElementById('cs-chart').getContext('2d');
  charts.course=new Chart(ctx,{type:'bar',data:{
    labels:holes.map(h=>`H${h.hole}(P${h.par})`),
    datasets:[{label:'Avg Over Par',data:holes.map(h=>h.avgOP),
      backgroundColor:holes.map(h=>h.avgOP>1.5?'rgba(248,81,73,.7)':h.avgOP>.75?'rgba(227,179,65,.7)':'rgba(63,185,80,.7)'),
      borderRadius:5}]
  },options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false}},
    scales:{
      y:{ticks:{color:'#8b949e'},grid:{color:'#21262d'},title:{display:true,text:'Avg Strokes Over Par',color:'#8b949e'}},
      x:{ticks:{color:'#8b949e'},grid:{color:'#21262d'}}
    }
  }});
}

function rPlayoffs() {
  const el = document.getElementById('playoffs');
  const PD = D.playoff;
  const rounds    = PD.rounds;
  const completed = new Set(PD.completed);
  const players   = PD.players;
  const nonDQ     = players.filter(p => !p.dq);
  const leader    = nonDQ[0];  // rank 1 after sort
  const doneCount = PD.completed.length;
  const cards = statCards([
    [nonDQ.length, 'Active Players'],
    [doneCount + ' of ' + rounds.length, 'Rounds Complete'],
    [leader ? esc(leader.player) : '—', 'Net Leader', 'g'],
    [leader && leader.totalNet != null ? leader.totalNet : (leader ? leader.projTotalNet + ' proj' : '—'), 'Leader Net', 'g'],
  ]);
  const rHdrs = rounds.map(r => {
    const isFuture = !completed.has(r);
    const st = isFuture ? 'background:rgba(88,166,255,.07);color:#58a6ff' : '';
    return `<th colspan="2" style="text-align:center;border-left:1px solid var(--border);${st}">${r}${isFuture ? ' <span style="font-size:.6rem;opacity:.7">(proj)</span>' : ''}</th>`;
  }).join('');
  const rSubHdrs = rounds.map(() =>
    `<th style="text-align:center;font-size:.65rem">Gross</th><th style="text-align:center;font-size:.65rem">Net</th>`
  ).join('');
  const rows = players.map(p => {
    const isLeader = p.rank === 1 && p.inClubhouse;
    const medal    = p.rank === 1 ? '<span class="gd">★</span> ' : '';
    const trOpen   = p.dq ? `<tr style="opacity:.5">` : `<tr class="${p.rank === 1 ? 'row-champ' : ''}">`;
    const rankCell = p.dq ? `<td class="rk r">DQ</td>` : `<td class="rk">${p.rank}</td>`;
    const rCells = p.rounds.map(r => {
      const bl = 'border-left:1px solid var(--border)';
      if (r.dropped)
        return `<td class="pc mu" style="${bl};text-decoration:line-through" title="Dropped — worst round">${r.gross}</td><td class="pc mu">—</td>`;
      if (r.played)
        return `<td class="tot pc" style="${bl}">${r.gross}</td><td class="pc">${r.net}</td>`;
      if (!r.future)
        return `<td class="pc" style="${bl}"><span class="r">✗</span></td><td class="pc"><span class="mu">—</span></td>`;
      // Future round — always show projected score (blue) for everyone
      return `<td colspan="2" class="pc" style="${bl};background:rgba(88,166,255,.08);color:#58a6ff;font-size:.72rem;white-space:nowrap">${r.projGross} <span style="font-size:.62rem;opacity:.75">(proj)</span></td>`;
    }).join('');
    const tg = p.totalGross != null ? p.totalGross : '<span class="mu">—</span>';
    const cbBadge = p.inClubhouse ? ` <span style="color:var(--gold);font-size:.7rem;font-weight:700">(CB)</span>` : '';
    const tn = p.totalNet != null
      ? `${p.totalNet}${cbBadge}`
      : (p.dq ? '<span class="r">DQ</span>' : '<span class="mu">—</span>');
    let tw;
    if (isLeader)              { tw = `<span class="g">In ✓</span>`; }
    else if (p.dq)             { tw = `<span class="r">DQ</span>`; }
    else if (p.scoreToWin != null) {
      const diff = Math.round((p.scoreToWin - p.avg) * 10) / 10;
      const sign  = diff >= 0 ? '+' : '';
      const color = diff < 0 ? 'var(--red)' : 'var(--accent)';
      tw = `${p.scoreToWin} <span style="color:${color};font-size:.75rem">(${sign}${diff.toFixed(1)})</span>`;
    } else                     { tw = '<span class="mu">—</span>'; }
    return `${trOpen}
      ${rankCell}
      <td class="pl">${medal}${esc(p.player)}</td>
      <td class="hc">${fmt(p.hc,2)}</td>
      ${rCells}
      <td class="tot" style="border-left:1px solid var(--border)">${tg}</td>
      <td class="tot">${tn}</td>
      <td style="text-align:center;border-left:1px solid var(--border);font-weight:600">${tw}</td>
    </tr>`;
  }).join('');
  el.innerHTML = cards + `
    <div class="card">
      <div class="card-title">🏆 Playoff Leaderboard</div>
      <div class="card-sub">Best ${PD.useBest} of ${rounds.length} rounds (worst dropped) · Net = Gross − HC · Low net wins · ✗ = missed round · <span style="color:#58a6ff">(proj)</span> = round not yet played · <span style="color:var(--gold)">(CB)</span> = in the clubhouse · DQ = missed 2+ rounds</div>
      <div class="tbl-wrap"><table class="dtbl">
        <thead>
          <tr><th rowspan="2">#</th><th rowspan="2">Player</th><th rowspan="2">HC</th>${rHdrs}<th rowspan="2" style="text-align:center;border-left:1px solid var(--border)">Tot Gross</th><th rowspan="2" style="text-align:center">Tot Net</th><th rowspan="2" style="text-align:center;border-left:1px solid var(--border);font-size:.68rem">Need To Shoot<br>(vs Avg)</th></tr>
          <tr>${rSubHdrs}</tr>
        </thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
}

async function runSim() {
  const selected = D.mcPlayers.filter(p=>{
    const cb=document.getElementById('mcp-'+p.player.replace(/\s/g,'_'));
    return cb && cb.checked;
  });
  if(selected.length < 2){ alert('Select at least 2 players.'); return; }

  const btn=document.getElementById('run-btn');
  btn.disabled=true; btn.textContent='Running…';
  document.getElementById('mc-status').textContent='';
  document.getElementById('prog-bar').style.width='0%';

  const COURSES=['Red','Gold','Blue'];
  const CHUNK=5000;
  const results={};
  selected.forEach(p=>results[p.player]={wins:0,top3:0,top10:0,nets:[]});

  let done=0;
  while(done<mcIter){
    const batch=Math.min(CHUNK,mcIter-done);
    for(let i=0;i<batch;i++){
      // 4 courses: Red, Gold, Blue + 1 random repeat
      const extra=COURSES[Math.floor(Math.random()*3)];
      const rounds=[...COURSES,extra];
      const sim=selected.map(p=>({
        player:p.player,
        net: (()=>{
          const nets=rounds.map(c=>sampleRound(p,c)-p.playoffHC);
          nets.sort((a,b)=>a-b);
          return +(nets[0]+nets[1]+nets[2]).toFixed(2);
        })()
      }));
      sim.sort((a,b)=>a.net-b.net);
      sim.forEach((r,rank)=>{
        const res=results[r.player];
        if(rank===0) res.wins++;
        if(rank<3)   res.top3++;
        if(rank<10)  res.top10++;
        res.nets.push(r.net);
      });
    }
    done+=batch;
    const pct=(done/mcIter*100).toFixed(0);
    document.getElementById('prog-bar').style.width=pct+'%';
    document.getElementById('mc-status').textContent=`${done.toLocaleString()} / ${mcIter.toLocaleString()} iterations…`;
    await new Promise(r=>setTimeout(r,0));
  }

  // Compute medians
  const table=[];
  selected.forEach(p=>{
    const res=results[p.player];
    const sorted=[...res.nets].sort((a,b)=>a-b);
    const med=sorted[Math.floor(sorted.length/2)];
    const sdata=D.standings.find(x=>x.player===p.player);
    table.push({
      player:p.player, hc:p.playoffHC, rounds:p.rounds,
      win:+(res.wins/mcIter*100).toFixed(1),
      top3:+(res.top3/mcIter*100).toFixed(1),
      top10:+(res.top10/mcIter*100).toFixed(1),
      med:+med.toFixed(1),
    });
  });
  table.sort((a,b)=>b.win-a.win);
  mcRes=table;

  btn.disabled=false; btn.textContent='▶ Run Simulation';
  document.getElementById('mc-status').textContent=`✓ ${mcIter.toLocaleString()} iterations complete`;
  document.getElementById('prog-bar').style.width='100%';
  displayMCResults(table);
}

function sampleRound(p, course) {
  const cs = p.courses[course];
  let mean, std;
  const leagueStd = D.leagueStd, minStd = D.minStd;
  const cdiff = D.courseDiffs[course] || 0;

  if(cs && cs.n >= D.mcMinData) {
    mean = cs.mean;
    std  = Math.max(cs.std || leagueStd, minStd);
  } else if(cs && cs.n > 0) {
    // Have some course-specific data — blend mean, use overall std
    mean = (cs.mean * cs.n + (p.overallMean+cdiff) * (D.mcMinData-cs.n)) / D.mcMinData;
    const w = cs.n / D.mcMinData;
    std  = Math.max(w*(cs.std||leagueStd) + (1-w)*leagueStd, minStd);
  } else if(p.overallMean) {
    mean = p.overallMean + cdiff;
    // Blend own std with league based on overall rounds
    const w = Math.min(p.n, D.mcMinData) / D.mcMinData;
    std  = Math.max(w*(p.overallStd||leagueStd) + (1-w)*leagueStd, minStd);
  } else {
    // Very sparse — use league baseline
    mean = 36 + 10 + cdiff;  // rough field avg over par
    std  = leagueStd;
  }
  return randNorm(mean, std);
}

function randNorm(mean, std) {
  let u1; do{u1=Math.random();}while(u1<1e-10);
  const z=Math.sqrt(-2*Math.log(u1))*Math.cos(2*Math.PI*Math.random());
  return mean+std*z;
}

function emBuildBody() {
  const latest = D.weekly[D.weekly.length - 1];
  if (!latest) return '';
  const cm = (D.commentary && D.commentary.weeklyRecaps || {})[String(latest.week)] || {};
  const L = [];
  const DIV = '─'.repeat(65);

  // Get hole pars from courseStats
  const csHoles = (D.courseStats[latest.course] && D.courseStats[latest.course].holes) || [];
  const pars = csHoles.map(h => h.par);
  const parTotal = pars.length ? pars.reduce((a,b)=>a+b,0) : 36;

  // Subject line
  const dateStr = dfmt(latest.date, {month:'long', day:'numeric'}) || latest.date;
  L.push('Subject: 🍺 Beer League Week ' + latest.week + ' Recap — ' + latest.course + ', ' + dateStr);
  L.push('');
  if (D.dashboardUrl) { L.push('Beer League Dashboard'); L.push(D.dashboardUrl); L.push(''); }

  // Intro: first paragraph of commentary body, or auto-generated fallback
  if ((cm.body || '').trim()) {
    L.push(cm.body.trim().split('\n\n')[0]);
  } else {
    const lowRow = [...(latest.rows||[])].sort((a,b)=>(a.total||99)-(b.total||99))[0];
    const op = lowRow && lowRow.overPar != null ? (lowRow.overPar>=0 ? '+'+lowRow.overPar : ''+lowRow.overPar) : '';
    L.push((lowRow ? lowRow.player + ' led the field with a ' + lowRow.total + ' (' + op + ') on the ' + latest.course + ' Course. ' : '') +
           'The field averaged ' + latest.fieldAvg + ' (+' + (latest.fieldAvgOP||'?') + ') across ' + latest.count + ' players.');
  }
  L.push('');

  // Scorecard
  L.push(DIV);
  L.push('WEEK ' + latest.week + ' SCORECARD — ' + latest.course + ' Course (Par ' + parTotal + ')');
  L.push(DIV);
  L.push('Player           H1   H2   H3   H4   H5   H6   H7   H8   H9    Tot     OP');
  L.push('─'.repeat(72));
  const sorted = [...(latest.rows||[])].sort((a,b)=>(a.total||99)-(b.total||99));
  sorted.forEach(r => {
    const name = (r.player||'').padEnd(15).slice(0,15);
    const hols = (r.holes||[]).map(h => (h==null?'—':String(h)).padStart(4)).join('');
    const opVal = r.overPar != null ? (r.overPar>=0 ? '+'+r.overPar : ''+r.overPar) : '—';
    L.push(name + ' ' + hols + String(r.total||'—').padStart(6) + opVal.padStart(6));
  });
  L.push('');

  // Birdies
  const birdieLines = [];
  sorted.forEach(r => {
    const bHoles = (r.holes||[]).reduce((acc,h,i) => {
      if (h!=null && pars[i]!=null && h <= pars[i]-1) acc.push('H'+(i+1));
      return acc;
    }, []);
    if (bHoles.length) birdieLines.push((r.player||'').padEnd(10) + ' — ' + bHoles.join(', '));
  });
  if (birdieLines.length) {
    L.push(DIV);
    L.push('BIRDIES (' + latest.birdies + ' total)');
    L.push(DIV);
    birdieLines.forEach(bl => L.push(bl));
    L.push('');
  }

  // Full standings
  L.push(DIV);
  L.push('STANDINGS — All Players (Playoff Handicap)');
  L.push(DIV);
  D.standings.forEach((s, i) => {
    const rank = (' #'+(i+1)).slice(-3);
    const name = (s.player||'').padEnd(15).slice(0,15);
    const rndLbl = s.rounds===1 ? ' 1 round ' : String(s.rounds).padStart(2)+' rounds';
    const avg = s.avg != null ? s.avg.toFixed(2) : '—';
    const hc  = s.playoffHC != null ? s.playoffHC.toFixed(2) : '—';
    L.push(rank + '  ' + name + '  ' + rndLbl + '   Avg ' + avg.padStart(5) + '   HC ' + hc.padStart(5));
  });
  L.push('');
  L.push('See you on the course!');

  const body = L.join('\n');
  const pre = document.getElementById('em-body');
  if (pre) pre.textContent = body;
  return body;
}

function openGmail() {
  const checked = [...document.querySelectorAll('.em-chk:checked')].map(c => c.value);
  if (!checked.length) { alert('Please select at least one recipient.'); return; }
  const latest  = D.weekly[D.weekly.length - 1];
  const subject = 'Beer League Week ' + (latest ? latest.week : '') + ' Recap';
  const body    = emBuildBody();
  // Clipboard gets the full pretty version (Unicode dividers intact)
  try {
    const ta = document.createElement('textarea');
    ta.value = body; ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  } catch(e) {}
  // URL body: ASCII dividers + strip standings (too long for Gmail's URL limit)
  // ─ (U+2500) encodes to 9 chars each; 6 divider lines × 65 chars = ~3500 extra chars
  const stripped = body.replace(/─/g, '-');
  const cut = stripped.search(/-{50,}\nSTANDINGS/);
  const urlBody = (cut > 0 ? stripped.slice(0, cut).trimEnd() : stripped)
    + '\n\nSee you on the course!';
  const gmailUrl = 'https://mail.google.com/mail/?view=cm&fs=1'
    + '&to='   + checked.map(e => encodeURIComponent(e)).join(',')
    + '&su='   + encodeURIComponent(subject)
    + '&body=' + encodeURIComponent(urlBody);
  const win = window.open(gmailUrl, '_blank');
  if (win) { win.focus(); return; }
  // Popup blocked — inject a clickable fallback link into the panel
  let fb = document.getElementById('em-gmail-fb');
  if (!fb) {
    fb = document.createElement('p');

function emDoCopy(text, btn, resetLabel) {
  const ok = () => {
    btn.textContent = '✓ Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = resetLabel; btn.classList.remove('copied'); }, 2000);
  };
  try {
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(ok);
    } else {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy');
      document.body.removeChild(ta); ok();
    }
  } catch(e) { prompt('Copy (Ctrl+C):', text); }
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function esc2(s){ return String(s).replace(/'/g,"\\'"); }
